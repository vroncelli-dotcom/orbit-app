      </div>

const Btn = ({ children, v="red", onClick, disabled, s={} }) => {
  const V = {
    red:    { background:C.red,     color:C.white, border:"none",                  boxShadow:"0 2px 14px rgba(232,37,26,.28)" },
    outline:{ background:C.white,   color:C.ink,   border:`1.5px solid ${C.rule}`, boxShadow:"none" },
    ghost:  { background:C.warm,    color:C.body,  border:`1px solid ${C.rule}`,   boxShadow:"none" },
    navy:   { background:C.navy,    color:C.white, border:"none",                  boxShadow:"0 2px 12px rgba(0,48,87,.2)" },
    gold:   { background:C.gold,    color:C.white, border:"none",                  boxShadow:"0 2px 12px rgba(201,146,42,.3)" },
    soft:   { background:C.redSoft, color:C.red,   border:`1px solid ${C.redMid}`, boxShadow:"none" },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{ width:"100%", padding:"15px 20px", borderRadius:4, fontFamily:"Inter,sans-serif", fontWeight:600, fontSize:15, cursor:disabled?"not-allowed":"pointer", opacity:disabled?.45:1, transition:"opacity .15s", ...V[v], ...s }}>{children}</button>
  );
};

// ── State Dropdown ─────────────────────────────────────────────────────────────
function StateDropdown({ selected, onChange }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState("");
  const filtered = ALL_STATES.filter(s=>s.toLowerCase().includes(search.toLowerCase()));
  return (
    <div>
      <div onClick={()=>setOpen(o=>!o)} style={{ borderBottom:`2px solid ${selected.length?C.red:C.rule}`, padding:"10px 0", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ ...T.body, fontSize:14, color:selected.length?C.ink:C.ghost }}>
          {selected.length===0?"Select states...":selected.length===1?selected[0]:`${selected.length} states selected`}
        </div>
        <div style={{ ...T.label, fontSize:10, color:C.muted }}>{open?"▲":"▼"}</div>
      </div>
      {selected.length>0 && (
        <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:10 }}>
          {selected.map(s=>(
            <div key={s} style={{ display:"flex", alignItems:"center", gap:5, background:C.navy, borderRadius:20, padding:"3px 10px" }}>
              <div style={{ ...T.label, fontSize:8, color:C.white }}>{s}</div>
              <button onClick={e=>{e.stopPropagation();onChange(selected.filter(x=>x!==s));}} style={{ background:"none", border:"none", color:"rgba(255,255,255,.6)", fontSize:12, cursor:"pointer", lineHeight:1, padding:0 }}>x</button>
            </div>
          ))}
        </div>
      )}
      {open && (
        <div style={{ position:"fixed", top:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:420, height:"100vh", background:"rgba(17,17,16,.6)", zIndex:300, display:"flex", flexDirection:"column", justifyContent:"flex-end" }}>
          <div style={{ background:C.white, borderRadius:"12px 12px 0 0", maxHeight:"80vh", display:"flex", flexDirection:"column" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"20px 20px 14px", borderBottom:`1px solid ${C.rule}` }}>
              <div style={{ ...T.heading, fontSize:18, color:C.ink }}>Select States</div>
              <button onClick={()=>setOpen(false)} style={{ background:"none", border:"none", color:C.muted, fontSize:24, cursor:"pointer" }}>x</button>
            </div>
            <div style={{ padding:"12px 20px", borderBottom:`1px solid ${C.rule}` }}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search states..."
                style={{ width:"100%", padding:"10px 14px", background:C.warm, border:`1px solid ${C.rule}`, borderRadius:4, ...T.body, fontSize:14, color:C.ink, outline:"none", boxSizing:"border-box" }}/>
            </div>
            <div style={{ padding:"10px 20px", borderBottom:`1px solid ${C.rule}`, display:"flex", gap:8 }}>
              <button onClick={()=>onChange(ALL_STATES)} style={{ padding:"5px 12px", background:C.ink, color:C.white, border:"none", borderRadius:20, ...T.label, fontSize:8, cursor:"pointer" }}>All 50</button>
              <button onClick={()=>onChange([])} style={{ padding:"5px 12px", background:"transparent", color:C.muted, border:`1px solid ${C.rule}`, borderRadius:20, ...T.label, fontSize:8, cursor:"pointer" }}>Clear</button>
              <div style={{ ...T.label, fontSize:8, color:C.muted, display:"flex", alignItems:"center" }}>{selected.length} selected</div>
            </div>
            <div style={{ overflowY:"auto", flex:1, WebkitOverflowScrolling:"touch" }}>
              {filtered.map(state=>{
                const sel=selected.includes(state);
                return (
                  <div key={state} onClick={()=>onChange(sel?selected.filter(x=>x!==state):[...selected,state])}
                    style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 20px", borderBottom:`1px solid ${C.rule}`, cursor:"pointer", background:sel?C.redSoft:C.white }}>
                    <div style={{ ...T.body, fontSize:15, color:sel?C.red:C.ink }}>{state}</div>
                    {sel && <div style={{ color:C.red }}>&#10003;</div>}
                  </div>
                );
              })}
            </div>
            <div style={{ padding:"12px 20px 32px", borderTop:`1px solid ${C.rule}` }}>
              <Btn v="red" onClick={()=>setOpen(false)}>Done — {selected.length} state{selected.length!==1?"s":""} selected</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Social link row ────────────────────────────────────────────────────────────
function SocialLinkRow({ icon, label, value, onChange, placeholder }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value||"");
  const save = ()=>{ onChange(draft.trim()); setEditing(false); };
  return (
    <div style={{ display:"flex", alignItems:"center", gap:12, padding:"14px 0", borderBottom:`1px solid ${C.rule}` }}>
      <div style={{ width:36, height:36, borderRadius:8, background:value?C.ink:C.warm, border:`1px solid ${value?C.ink:C.rule}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
        <div style={{ ...T.label, fontSize:10, color:value?C.white:C.ghost }}>{icon}</div>
      </div>
      <div style={{ flex:1 }}>
        <div style={{ ...T.label, fontSize:8, color:C.muted, marginBottom:2 }}>{label.toUpperCase()}</div>
        {editing ? (
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <input value={draft} onChange={e=>setDraft(e.target.value)} placeholder={placeholder} autoFocus onKeyDown={e=>e.key==="Enter"&&save()}
              style={{ flex:1, background:"transparent", border:"none", borderBottom:`1px solid ${C.red}`, ...T.body, fontSize:13, color:C.ink, outline:"none", padding:"2px 0" }}/>
            <button onClick={save} style={{ background:C.red, border:"none", borderRadius:4, padding:"4px 10px", ...T.label, fontSize:8, color:C.white, cursor:"pointer" }}>Save</button>
            <button onClick={()=>setEditing(false)} style={{ background:"none", border:"none", color:C.muted, fontSize:16, cursor:"pointer" }}>x</button>
          </div>
        ) : (
          <div style={{ ...T.body, fontSize:13, color:value?C.ink:C.ghost, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
            {value ? <a href={value.startsWith("http")?value:`https://${value}`} target="_blank" rel="noreferrer" style={{ color:C.red }}>{value}</a> : placeholder}
          </div>
        )}
      </div>
      {!editing && <button onClick={()=>{setDraft(value||"");setEditing(true);}} style={{ background:"none", border:"none", ...T.label, fontSize:10, color:C.red, cursor:"pointer", flexShrink:0 }}>{value?"Edit":"Add"}</button>}
    </div>
  );
}

// ── Reviews section ────────────────────────────────────────────────────────────
function ReviewSection({ googleUrl, experienceUrl, onGoogleChange, onExperienceChange }) {
  const [editG, setEditG] = useState(false);
  const [editE, setEditE] = useState(false);
  const [draftG, setDraftG] = useState(googleUrl||"");
  const [draftE, setDraftE] = useState(experienceUrl||"");
  return (
    <div>
      <Lbl>Reviews</Lbl>
      {[
        { label:"Google Reviews", url:googleUrl, editing:editG, setEditing:setEditG, draft:draftG, setDraft:setDraftG, onSave:v=>{onGoogleChange(v);setEditG(false);}, placeholder:"Paste your Google Maps profile URL" },
        { label:"Experience.com", url:experienceUrl, editing:editE, setEditing:setEditE, draft:draftE, setDraft:setDraftE, onSave:v=>{onExperienceChange(v);setEditE(false);}, placeholder:"Paste your Experience.com profile URL" },
      ].map(r=>(
        <div key={r.label} style={{ padding:"14px 0", borderBottom:`1px solid ${C.rule}` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
            <div style={{ ...T.subhead, fontSize:14, color:C.ink }}>{r.label}</div>
            <button onClick={()=>{r.setDraft(r.url||"");r.setEditing(e=>!e);}} style={{ background:"none", border:"none", ...T.label, fontSize:10, color:C.red, cursor:"pointer" }}>
              {r.url?"Edit":"Connect"}
            </button>
          </div>
          {r.editing && (
            <div style={{ background:C.warm, borderRadius:4, padding:"12px", border:`1px solid ${C.rule}` }}>
              <div style={{ ...T.caption, fontSize:12, color:C.muted, marginBottom:8 }}>{r.placeholder}</div>
              <input value={r.draft} onChange={e=>r.setDraft(e.target.value)} placeholder="https://..."
                style={{ width:"100%", background:"transparent", border:"none", borderBottom:`1px solid ${C.red}`, ...T.body, fontSize:13, color:C.ink, outline:"none", padding:"6px 0", marginBottom:10, boxSizing:"border-box" }}/>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={()=>r.onSave(r.draft.trim())} style={{ flex:1, padding:"9px", background:C.red, border:"none", borderRadius:4, ...T.label, fontSize:10, color:C.white, cursor:"pointer" }}>Save</button>
                <button onClick={()=>r.setEditing(false)} style={{ padding:"9px 14px", background:"transparent", border:`1px solid ${C.rule}`, borderRadius:4, ...T.label, fontSize:10, color:C.muted, cursor:"pointer" }}>Cancel</button>
              </div>
            </div>
          )}
          {r.url && !r.editing && (
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{ width:8, height:8, borderRadius:"50%", background:C.green }}/>
              <a href={r.url} target="_blank" rel="noreferrer" style={{ ...T.label, fontSize:10, color:C.red }}>Connected — view profile</a>
            </div>
          )}
          {!r.url && !r.editing && <div style={{ ...T.caption, fontSize:12, color:C.ghost }}>Not connected</div>}
        </div>
      ))}
    </div>
  );
}

// ── Chat Screen ────────────────────────────────────────────────────────────────
function ChatScreen({ matchId, party, onBack, onSchedule }) {
  const key = `orbit_messages_${matchId}`;
  const [messages, setMessages] = useState(()=>{
    const saved = LS.get(key, []);
    if(saved.length>0) return saved;
    return [{ from:"them", text:`Hi! We would love to connect with you about opportunities here.`, time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) }];
  });
  const [input, setInput] = useState("");
  const bottomRef = useRef();
  useEffect(()=>{ bottomRef.current?.scrollIntoView({ behavior:"smooth" }); },[messages]);
  const send = ()=>{
    if(!input.trim()) return;
    const msg = { from:"me", text:input.trim(), time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) };
    const updated = [...messages, msg];
    setMessages(updated); LS.set(key, updated); setInput("");
  };
  const name = party?.name||party?.alias||"them";
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:C.off }}>
      <div style={{ background:C.white, padding:"52px 20px 14px", display:"flex", alignItems:"center", gap:14, borderBottom:`1px solid ${C.rule}` }}>
        <BackBtn onClick={onBack}/>
        <div style={{ flex:1 }}>
          <div style={{ ...T.heading, fontSize:16, color:C.ink }}>{name}</div>
          <div style={{ ...T.label, fontSize:9, color:C.green, marginTop:2 }}>Matched on Orbit</div>
        </div>
        <button onClick={()=>onSchedule(party)} style={{ background:"none", border:`1px solid ${C.rule}`, borderRadius:4, padding:"9px 14px", ...T.label, fontSize:11, color:C.ink, cursor:"pointer" }}>Schedule</button>
        <button onClick={onBack} style={{ background:"none", border:`1px solid ${C.redMid}`, borderRadius:4, padding:"9px 12px", ...T.label, fontSize:11, color:C.red, cursor:"pointer", marginLeft:4 }}>End</button>
      </div>
      <div style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:"20px 16px 8px", display:"flex", flexDirection:"column", gap:12 }}>
        {messages.map((msg,i)=>(
          <div key={i} style={{ display:"flex", justifyContent:msg.from==="me"?"flex-end":"flex-start" }}>
            <div style={{ maxWidth:"78%" }}>
              <div style={{ padding:"12px 16px", background:msg.from==="me"?C.red:C.white, color:msg.from==="me"?C.white:C.ink, borderRadius:msg.from==="me"?"16px 16px 2px 16px":"16px 16px 16px 2px", ...T.body, fontSize:14, lineHeight:1.5, boxShadow:msg.from==="me"?"none":"0 1px 6px rgba(0,0,0,.06)" }}>{msg.text}</div>
              <div style={{ ...T.caption, fontSize:10, color:C.muted, marginTop:4, textAlign:msg.from==="me"?"right":"left" }}>{msg.time}</div>
            </div>
          </div>
        ))}
        <div ref={bottomRef}/>
      </div>
      <div style={{ padding:"12px 16px 32px", background:C.white, borderTop:`1px solid ${C.rule}`, display:"flex", gap:10, alignItems:"flex-end" }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Type a message..."
          style={{ flex:1, padding:"12px 0", background:"transparent", border:"none", borderBottom:`1px solid ${C.rule}`, ...T.body, fontSize:14, color:C.ink, outline:"none" }}/>
        <button onClick={send} style={{ width:42, height:42, borderRadius:"50%", background:input.trim()?C.red:C.rule, border:"none", color:C.white, fontSize:16, cursor:"pointer", transition:"background .2s" }}>&#8593;</button>
      </div>
    </div>
  );
}

// ── Post Detail ────────────────────────────────────────────────────────────────
function PostDetail({ post, replies, onBack, currentUser, onAddReply }) {
  const [input, setInput] = useState("");
  const [likedR, setLikedR] = useState(()=>LS.get("orbit_liked_replies",{}));
  const bottomRef = useRef();
  const toggleRL = id=>{ const u={...likedR,[id]:!likedR[id]}; setLikedR(u); LS.set("orbit_liked_replies",u); };
  const submit = ()=>{
    if(!input.trim()) return;
    const loProf = typeof LS !== "undefined" ? LS.get("orbit_lo_profile",{}) : {};
    const coProf = typeof LS !== "undefined" ? LS.get("orbit_co_profile",{}) : {};
    const fn = loProf.firstName||coProf.firstName||currentUser?.firstName||"You";
    const ln = loProf.lastName||coProf.lastName||currentUser?.lastName||"";
    const role = currentUser?.accountType==="lo"?(loProf.role||"Loan Officer"):(coProf.companyName?"Hiring Manager":"Hiring Manager");
    onAddReply(post.id,{ id:"r-"+Date.now(), author:`${fn} ${ln[0]||""}.`.trim(), role, time:"Just now", text:input.trim(), likes:0 });
    setInput(""); setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),100);
  };
  const cc=post.cat==="Win"?C.red:post.cat==="Advice"?C.green:C.muted;
  const cb=post.cat==="Win"?C.redSoft:post.cat==="Advice"?C.greenSoft:C.warm;
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:C.white }}>
      <div style={{ background:C.white, padding:"52px 24px 14px", display:"flex", alignItems:"center", gap:14, borderBottom:`1px solid ${C.rule}`, flexShrink:0 }}>
        <BackBtn onClick={onBack}/>
        <div style={{ ...T.heading, fontSize:16, color:C.ink, flex:1 }}>Post</div>
        <div style={{ ...T.label, fontSize:8, color:cc, background:cb, padding:"3px 9px", borderRadius:20 }}>{post.cat.toUpperCase()}</div>
      </div>
      <div style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:"0 24px" }}>
        <div style={{ padding:"20px 0", borderBottom:`1px solid ${C.rule}` }}>
          <div style={{ ...T.subhead, fontSize:14, color:C.ink }}>{post.author}</div>
          <div style={{ ...T.caption, fontSize:11, color:C.muted, marginBottom:12 }}>{post.role} · {post.time}</div>
          <p style={{ ...T.body, fontSize:15, color:C.body, lineHeight:1.7, marginBottom:14 }}>{post.text}</p>
          <div style={{ display:"flex", gap:16, alignItems:"center" }}>
            <div style={{ ...T.label, fontSize:9, color:C.muted }}>{post.likes} likes</div>
            <div style={{ ...T.label, fontSize:9, color:C.muted }}>{replies.length} replies</div>
          </div>
        </div>
        {replies.length>0 && <div style={{ ...T.label, fontSize:9, color:C.muted, padding:"14px 0 4px" }}>Replies</div>}
        {replies.map((r,i)=>(
          <div key={r.id} style={{ padding:"16px 0", borderBottom:i<replies.length-1?`1px solid ${C.rule}`:"none" }}>
            <div style={{ ...T.subhead, fontSize:13, color:C.ink }}>{r.author}</div>
            <div style={{ ...T.caption, fontSize:11, color:C.muted, marginBottom:10 }}>{r.role} · {r.time}</div>
            <p style={{ ...T.body, fontSize:14, color:C.body, lineHeight:1.65, marginBottom:10 }}>{r.text}</p>
            <button onClick={()=>toggleRL(r.id)} style={{ background:"none", border:"none", display:"flex", alignItems:"center", gap:6, padding:0, cursor:"pointer" }}>
              <span style={{ fontSize:15, color:likedR[r.id]?C.red:C.ghost }}>{likedR[r.id]?"♥":"♡"}</span>
              <span style={{ ...T.label, fontSize:9, color:likedR[r.id]?C.red:C.muted }}>{r.likes+(likedR[r.id]?1:0)}</span>
            </button>
          </div>
        ))}
        <div ref={bottomRef} style={{ height:20 }}/>
      </div>
      <div style={{ padding:"12px 16px 32px", background:C.white, borderTop:`1px solid ${C.rule}`, display:"flex", gap:10, alignItems:"flex-end", flexShrink:0 }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Add a reply..."
          style={{ flex:1, padding:"10px 0", background:"transparent", border:"none", borderBottom:`1px solid ${C.rule}`, ...T.body, fontSize:14, color:C.ink, outline:"none" }}/>
        <button onClick={submit} style={{ width:38, height:38, borderRadius:"50%", background:input.trim()?C.red:C.rule, border:"none", color:C.white, fontSize:16, cursor:"pointer", transition:"background .2s" }}>&#8593;</button>
      </div>
    </div>
  );
}


// ── Swipe Cards ───────────────────────────────────────────────────────────────
function CompanyCard({ co, onSwipe, isTop }) {
  const [dragX, setDragX] = useState(0);
  const [drag, setDrag] = useState(false);
  const [tab, setTab] = useState("story");
  const sx = useRef(0);
  const dn=x=>{setDrag(true);sx.current=x;};
  const mv=x=>{if(drag)setDragX(x-sx.current);};
  const up=()=>{ if(!drag)return; setDrag(false); if(dragX>50)onSwipe("right"); else if(dragX<-50)onSwipe("left"); else setDragX(0); };
  return (
    <div onMouseDown={e=>dn(e.clientX)} onMouseMove={e=>mv(e.clientX)} onMouseUp={up} onMouseLeave={up}
      onTouchStart={e=>dn(e.touches[0].clientX)} onTouchMove={e=>mv(e.touches[0].clientX)} onTouchEnd={up}
      style={{ position:"absolute", inset:0, transform:`translateX(${isTop?dragX:0}px) rotate(${isTop?dragX*.024:0}deg) scale(${isTop?1:.97})`, transition:drag?"none":"transform .32s cubic-bezier(.34,1.56,.64,1)", cursor:isTop?"grab":"default", userSelect:"none", zIndex:isTop?10:5 }}>
      {isTop&&dragX>25&&<div style={{ position:"absolute", top:18, left:16, zIndex:20, background:C.white, border:`2px solid ${C.green}`, color:C.green, padding:"5px 16px", borderRadius:4, ...T.label, fontSize:12, opacity:Math.min(dragX/50,1) }}>Interested</div>}

function CreateAccountScreen({ onBack, accountType, onDone }) {
  const [f, setF] = useState({ firstName:"", lastName:"", email:"", password:"", confirm:"" });
  const [showPass, setShowPass] = useState(false);
  const [loading, setLoading] = useState(false);
  const [errors, setErrors] = useState({});
  const set=(k,v)=>{ setF(p=>({...p,[k]:v})); setErrors(p=>({...p,[k]:""})); };
  const validate=()=>{
    const e={};
    if(!f.firstName.trim()) e.firstName="Required";
    if(!f.lastName.trim()) e.lastName="Required";
    if(!f.email.includes("@")||!f.email.includes(".")) e.email="Enter a valid email";
    if(f.password.length<8) e.password="Must be at least 8 characters";
    if(f.password!==f.confirm) e.confirm="Passwords don't match";
    setErrors(e); return Object.keys(e).length===0;
  };
  const submit=()=>{
    if(!validate()) return;
    setLoading(true);
    setTimeout(()=>{
      const user={ id:"u-"+Date.now(), email:f.email, firstName:f.firstName, lastName:f.lastName, accountType, verified:false, createdAt:Date.now() };
      LS.set("orbit_user", user);
      setLoading(false); onDone(user);
    }, 1600);
  };
  const isLO = accountType==="lo";
  const Field=({label,field,placeholder,type="text"})=>(
    <div>
      <Lbl>{label}</Lbl>
      <input value={f[field]} onChange={e=>set(field,e.target.value)} placeholder={placeholder} type={type}
        style={{ width:"100%", background:"transparent", border:"none", outline:"none", borderBottom:`2px solid ${errors[field]?C.red:f[field]?C.ink:C.rule}`, ...T.body, fontSize:16, color:C.ink, padding:"8px 0", boxSizing:"border-box" }}/>
      {errors[field]&&<div style={{ ...T.caption, fontSize:12, color:C.red, marginTop:4 }}>{errors[field]}</div>}
    </div>
  );
  return (
    <div style={{ minHeight:"100vh", background:C.white, padding:"52px 28px 160px", display:"flex", flexDirection:"column" }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:32 }}>
        <BackBtn onClick={onBack}/><Logo size="sm"/>
      </div>
      <div style={{ display:"inline-flex", alignItems:"center", gap:6, marginBottom:14 }}>
        <div style={{ width:8, height:8, borderRadius:"50%", background:isLO?C.red:C.navy }}/>
        <div style={{ ...T.label, fontSize:9, color:isLO?C.red:C.navy }}>{isLO?"Mortgage Professional":"Hiring Company"}</div>
      </div>
      <div style={{ ...T.display, fontSize:36, color:C.ink, lineHeight:.95, marginBottom:8 }}>Create your<br/>account.</div>
      <p style={{ ...T.body, fontSize:14, color:C.body, lineHeight:1.7, marginBottom:32 }}>
        {isLO?"Your information is private. We never share without your permission.":"14 days free. No credit card required."}
      </p>
      <div style={{ display:"flex", flexDirection:"column", gap:22, marginBottom:16 }}>
        <div style={{ display:"flex", gap:14 }}>
          <div style={{ flex:1 }}><Field label="First name" field="firstName" placeholder="Jordan"/></div>
          <div style={{ flex:1 }}><Field label="Last name" field="lastName" placeholder="Rivera"/></div>
        </div>
        <Field label="Email address" field="email" placeholder="you@example.com" type="email"/>
        <div>
          <Lbl>Password</Lbl>
          <div style={{ display:"flex", alignItems:"center", borderBottom:`2px solid ${errors.password?C.red:f.password?C.ink:C.rule}` }}>
            <input value={f.password} onChange={e=>set("password",e.target.value)} placeholder="At least 8 characters" type={showPass?"text":"password"}
              style={{ flex:1, background:"transparent", border:"none", outline:"none", ...T.body, fontSize:16, color:C.ink, padding:"8px 0", boxSizing:"border-box" }}/>
            <button onClick={()=>setShowPass(s=>!s)} style={{ background:"none", border:"none", ...T.label, fontSize:9, color:C.muted, cursor:"pointer" }}>{showPass?"Hide":"Show"}</button>
          </div>
          {errors.password&&<div style={{ ...T.caption, fontSize:12, color:C.red, marginTop:4 }}>{errors.password}</div>}
        </div>
        <Field label="Confirm password" field="confirm" placeholder="Repeat your password" type="password"/>
      </div>
      <div style={{ ...T.caption, fontSize:11, color:C.ghost, lineHeight:1.6, marginBottom:16 }}>
        By creating an account you agree to Orbit's Terms of Service and Privacy Policy.
      </div>
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:420, padding:"16px 24px 32px", background:C.white, borderTop:`1px solid ${C.rule}` }}>
        {loading?(
          <div style={{ textAlign:"center", padding:"12px 0" }}>
            <div style={{ display:"flex", justifyContent:"center", gap:8, marginBottom:8 }}>{[0,1,2].map(i=><div key={i} style={{ width:9,height:9,borderRadius:"50%",background:C.red,opacity:0.2+i*0.4 }}/>)}</div>
            <div style={{ ...T.label, fontSize:9, color:C.muted }}>Creating your account...</div>
          </div>
        ):<Btn v="red" onClick={submit}>Create account</Btn>}

          {resent?"Code resent!":"Resend code"}

      </div>

// ── LO Onboarding ─────────────────────────────────────────────────────────────
function LOOnboard({ user, onDone }) {
  const [step, setStep] = useState("welcome");
  const [nmls, setNmls] = useState("");
  const [checking, setChecking] = useState(false);
  const [anon, setAnon] = useState(true);
  const [p, setP] = useState(()=>{
    const saved = LS.get("orbit_lo_profile",{});
    return {
      firstName:user?.firstName||"", lastName:user?.lastName||"",
      role:"", compTypes:[], minComp:"", style:"", states:[],
      loanTypes:[], specialties:[], languages:[], volume:"", experience:"", bio:"",
      nmls:"", nmlsVerified:false, anonMode:true,
      googleUrl:"", experienceUrl:"", linkedinUrl:"", instagramUrl:"", facebookUrl:"",
      ...saved,
      firstName:saved.firstName||user?.firstName||"",
      lastName:saved.lastName||user?.lastName||"",
    };
  });
  const upd=(k,v)=>setP(prev=>({...prev,[k]:v}));
  const tog=(k,v)=>setP(prev=>({...prev,[k]:prev[k].includes(v)?prev[k].filter(x=>x!==v):[...prev[k],v]}));
  const save=(next)=>{ LS.set("orbit_lo_profile",p); setStep(next); };
  const finish=()=>{ const final={...p,anonMode:anon}; LS.set("orbit_lo_profile",final); onDone(final); };

  if(step==="welcome") return (
    <div style={{ minHeight:"100vh", background:C.white, padding:"52px 28px 48px", display:"flex", flexDirection:"column" }}>
      <Logo/>
      <div style={{ flex:1, display:"flex", flexDirection:"column", justifyContent:"center" }}>
        <div style={{ ...T.label, fontSize:10, color:C.red, marginBottom:16 }}>Welcome, {user?.firstName}</div>
        <div style={{ ...T.display, fontSize:42, color:C.ink, lineHeight:.9, marginBottom:20 }}>Your career.<br/>Your rules.<br/>Your clients.</div>
        <p style={{ ...T.body, fontSize:15, color:C.body, lineHeight:1.7, marginBottom:40 }}>Orbit helps you find a shop that shares your values.</p>
        {[{n:"#2",t:"Your clients stay yours. Every shop here commits to it."},{n:"#8",t:"Work where you want. Close when you're ready."},{n:"#1",t:"Your terms. Your choices. Always."}].map((pt,i)=>(
          <div key={i} style={{ padding:"16px 0", borderBottom:`1px solid ${C.rule}`, display:"flex", gap:16 }}>
            <div style={{ ...T.label, fontSize:8, color:C.redMid, flexShrink:0, marginTop:3, minWidth:24 }}>{pt.n}</div>
            <div style={{ ...T.body, fontSize:14, color:C.body }}>{pt.t}</div>
          </div>
        ))}
        <div style={{ marginTop:36 }}><Btn v="red" onClick={()=>setStep("name")}>Get started</Btn></div>
      </div>
    </div>
  );


  // ── Name step (between welcome and NMLS) ──────────────────────────────────
  if(step==="name") return (
    <div style={{ minHeight:"100vh", background:C.white, padding:"52px 28px 160px", display:"flex", flexDirection:"column" }}>
      <StepHead onBack={()=>setStep("welcome")} step={1} total={7}/>
      <div style={{ ...T.label, fontSize:10, color:C.red, marginBottom:14 }}>Step 1 — Your Name</div>
      <div style={{ ...T.display, fontSize:40, color:C.ink, lineHeight:.92, marginBottom:12 }}>What should<br/>companies<br/>call you?</div>
      <p style={{ ...T.body, fontSize:14, color:C.body, lineHeight:1.7, marginBottom:36 }}>
        Your name is only revealed to companies you choose to connect with — never before.
      </p>
      <div style={{ display:"flex", flexDirection:"column", gap:24, marginBottom:20 }}>
        <div>
          <Lbl>First name</Lbl>
          <input
            value={p.firstName}
            onChange={e=>upd("firstName", e.target.value)}
            placeholder="Jordan"
            style={{ width:"100%", background:"transparent", border:"none", outline:"none", borderBottom:`2px solid ${p.firstName?C.red:C.rule}`, ...T.display, fontSize:32, color:C.ink, padding:"8px 0", boxSizing:"border-box" }}
          />
        </div>
        <div>
          <Lbl>Last name</Lbl>
          <input
            value={p.lastName}
            onChange={e=>upd("lastName", e.target.value)}
            placeholder="Rivera"
            style={{ width:"100%", background:"transparent", border:"none", outline:"none", borderBottom:`2px solid ${p.lastName?C.red:C.rule}`, ...T.display, fontSize:32, color:C.ink, padding:"8px 0", boxSizing:"border-box" }}
          />
        </div>
        <div style={{ background:C.warm, borderRadius:6, padding:"14px 16px", border:`1px solid ${C.rule}`, marginTop:8 }}>
          <div style={{ ...T.label, fontSize:9, color:C.muted, marginBottom:6 }}>Anonymity Mode protects you</div>
          <p style={{ ...T.body, fontSize:13, color:C.body, lineHeight:1.6 }}>
            When Anonymity Mode is on, companies see your production and skills — not your name or employer. You decide when and who to reveal to.
          </p>
        </div>
      </div>
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:420, padding:"16px 24px 32px", background:C.white, borderTop:`1px solid ${C.rule}` }}>
        <Btn v="red" onClick={()=>save("nmls")} disabled={!p.firstName.trim()||!p.lastName.trim()}>Continue</Btn>
      </div>
    </div>
  );

  if(step==="nmls") return (
    <div style={{ minHeight:"100vh", background:C.white, padding:"52px 28px 160px", display:"flex", flexDirection:"column" }}>
      <StepHead onBack={()=>setStep("name")} step={2} total={7}/>
      <div style={{ ...T.label, fontSize:10, color:C.red, marginBottom:14 }}>Step 1 — Verification</div>
      <div style={{ ...T.display, fontSize:40, color:C.ink, lineHeight:.92, marginBottom:12 }}>Your NMLS<br/>number.</div>
      <p style={{ ...T.body, fontSize:14, color:C.body, lineHeight:1.7, marginBottom:32 }}>We verify in seconds, not days.</p>
      <input value={nmls} onChange={e=>setNmls(e.target.value.replace(/\D/g,"").slice(0,10))} placeholder="e.g. 1847302" inputMode="numeric" pattern="[0-9]*"
        style={{ width:"100%", background:"transparent", border:"none", outline:"none", borderBottom:`2px solid ${nmls.length>4?C.red:C.rule}`, ...T.display, fontSize:40, color:C.ink, padding:"8px 0", letterSpacing:"0.04em", boxSizing:"border-box", marginBottom:10 }}/>
      <div style={{ ...T.caption, fontSize:12, color:C.ghost, marginBottom:20 }}>Professionals at Rocket Mortgage are not eligible at this time.</div>
      <div style={{ background:C.greenSoft, borderRadius:6, padding:"14px 16px", marginBottom:32, border:`1px solid rgba(10,122,74,.2)` }}>
        <div style={{ ...T.subhead, fontSize:13, color:C.green, marginBottom:3 }}>Your career is protected</div>
        <div style={{ ...T.body, fontSize:12, color:C.green, opacity:.85 }}>Orbit's retail and wholesale channels are completely firewalled. We don't poach. We don't share.</div>
        <div style={{ ...T.label, fontSize:8, color:C.green, marginTop:6, opacity:.6 }}>Partner Promise #2</div>
      </div>
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:420, padding:"16px 24px 32px", background:C.white, borderTop:`1px solid ${C.rule}` }}>
        {checking?(
          <div style={{ textAlign:"center", padding:"12px 0" }}>
            <div style={{ display:"flex", justifyContent:"center", gap:8, marginBottom:8 }}>{[0,1,2].map(i=><div key={i} style={{ width:9,height:9,borderRadius:"50%",background:C.red,opacity:0.2+i*0.4 }}/>)}</div>
            <div style={{ ...T.label, fontSize:9, color:C.muted }}>Verifying...</div>
          </div>
        ):(
          <>
            <Btn v="red" onClick={()=>{ setChecking(true); setTimeout(()=>{ setChecking(false); upd("nmls",nmls); upd("nmlsVerified",nmls.length>=5); setStep("role"); },1800); }} disabled={nmls.length<5}>Verify and continue</Btn>
            <button onClick={()=>setStep("role")} style={{ display:"block", width:"100%", marginTop:10, background:"none", border:"none", ...T.caption, fontSize:13, color:C.ghost, cursor:"pointer", padding:"6px" }}>Non-licensed role — skip</button>
          </>
        )}
      </div>
    </div>
  );

  if(step==="role") return (
    <div style={{ minHeight:"100vh", background:C.white, padding:"52px 28px 140px" }}>
      <StepHead onBack={()=>setStep("nmls")} step={3} total={7}/>
      <div style={{ ...T.label, fontSize:10, color:C.red, marginBottom:14 }}>Step 2 — Your Role</div>
      <div style={{ ...T.display, fontSize:34, color:C.ink, lineHeight:.95, marginBottom:28 }}>What do you do?</div>
      <div style={{ display:"flex", flexDirection:"column", gap:28 }}>
        <div>
          <Lbl>I am a</Lbl>
          <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
            {["Loan Officer","LOA","Processor","Underwriter","Branch Manager","Compliance","Marketing","Admin"].map(r=>(
              <button key={r} onClick={()=>upd("role",r)} style={{ padding:"10px 16px", background:p.role===r?C.ink:"transparent", color:p.role===r?C.white:C.muted, border:`1px solid ${p.role===r?C.ink:C.rule}`, borderRadius:4, ...T.label, fontSize:11, cursor:"pointer" }}>{r}</button>
            ))}
          </div>
        </div>
        <div>
          <Lbl>Work style preference</Lbl>
          <div style={{ display:"flex", gap:8 }}>
            {["Remote","Hybrid","In-office","Open"].map(s=>(
              <button key={s} onClick={()=>upd("style",s)} style={{ flex:1, padding:"12px 6px", background:p.style===s?C.ink:"transparent", color:p.style===s?C.white:C.muted, border:`1px solid ${p.style===s?C.ink:C.rule}`, borderRadius:4, ...T.label, fontSize:11, cursor:"pointer" }}>{s}</button>
            ))}
          </div>
        </div>
        <div>
          <Lbl>About you</Lbl>
          <textarea value={p.bio} onChange={e=>upd("bio",e.target.value)} rows={3} placeholder="Tell shops what drives you and what you're looking for..."
            style={{ width:"100%", background:"transparent", border:"none", outline:"none", borderBottom:`2px solid ${p.bio?C.red:C.rule}`, ...T.body, fontSize:14, color:C.ink, padding:"8px 0", resize:"none", lineHeight:1.6, boxSizing:"border-box" }}/>
        </div>
      </div>
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:420, padding:"16px 24px 32px", background:C.white, borderTop:`1px solid ${C.rule}` }}>
        <Btn v="red" onClick={()=>save("comp")} disabled={!p.role}>Continue</Btn>
      </div>
    </div>
  );

  if(step==="comp") return (
    <div style={{ minHeight:"100vh", background:C.white, padding:"52px 28px 140px" }}>
      <StepHead onBack={()=>setStep("role")} step={4} total={7}/>
      <div style={{ ...T.label, fontSize:10, color:C.red, marginBottom:14 }}>Step 3 — Compensation</div>
      <div style={{ ...T.display, fontSize:34, color:C.ink, lineHeight:.95, marginBottom:28 }}>What are you<br/>looking for?</div>
      <div style={{ display:"flex", flexDirection:"column", gap:28 }}>
        <div>
          <Lbl>Compensation types I'm open to</Lbl>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {[{v:"W2 Salary",h:"Base salary from employer"},{v:"1099 Commission",h:"Self-employed, you pay your own taxes"},{v:"Base + Commission",h:"Salary plus performance pay"},{v:"Revenue Share",h:"Earn a cut of team production"},{v:"Hourly",h:"Paid by the hour"},{v:"Open to All",h:"No preference"}].map(({v,h})=>(
              <button key={v} onClick={()=>tog("compTypes",v)} style={{ width:"100%", padding:"12px 16px", background:p.compTypes.includes(v)?C.red:"transparent", color:p.compTypes.includes(v)?C.white:C.ink, border:`1px solid ${p.compTypes.includes(v)?C.red:C.rule}`, borderRadius:4, cursor:"pointer", textAlign:"left", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span style={{ ...T.subhead, fontSize:14 }}>{v}</span>
                <span style={{ ...T.caption, fontSize:12, color:p.compTypes.includes(v)?"rgba(255,255,255,.65)":C.muted }}>{h}</span>
              </button>
            ))}
          </div>
        </div>
        <div>
          <Lbl>Minimum I'd consider</Lbl>
          <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
            {["50%+ split","65%+ split","75%+ split","80%+ split","$60K+ base","$80K+ base","$100K+ base","Negotiable"].map(c=>(
              <button key={c} onClick={()=>upd("minComp",c)} style={{ padding:"10px 14px", background:p.minComp===c?C.ink:"transparent", color:p.minComp===c?C.white:C.muted, border:`1px solid ${p.minComp===c?C.ink:C.rule}`, borderRadius:4, ...T.label, fontSize:11, cursor:"pointer" }}>{c}</button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:420, padding:"16px 24px 32px", background:C.white, borderTop:`1px solid ${C.rule}` }}>
        <Btn v="red" onClick={()=>save("markets")} disabled={!p.compTypes.length}>Continue</Btn>
      </div>
    </div>
  );

  if(step==="markets") return (
    <div style={{ minHeight:"100vh", background:C.white, padding:"52px 28px 140px" }}>
      <StepHead onBack={()=>setStep("comp")} step={5} total={7}/>
      <div style={{ ...T.label, fontSize:10, color:C.red, marginBottom:14 }}>Step 4 — Markets</div>
      <div style={{ ...T.display, fontSize:34, color:C.ink, lineHeight:.95, marginBottom:28 }}>Tell us what<br/>you're great at.</div>
      <div style={{ display:"flex", flexDirection:"column", gap:28 }}>
        <div><Lbl>States licensed in</Lbl><StateDropdown selected={p.states} onChange={v=>upd("states",v)}/></div>
        <div>
          <Lbl>Loan types</Lbl>
          <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
            {["Conventional","FHA","VA","USDA","Jumbo","Non-QM","Construction","HELOC","Reverse"].map(l=>(
              <button key={l} onClick={()=>tog("loanTypes",l)} style={{ padding:"9px 14px", background:p.loanTypes.includes(l)?C.red:"transparent", color:p.loanTypes.includes(l)?C.white:C.muted, border:`1px solid ${p.loanTypes.includes(l)?C.red:C.rule}`, borderRadius:4, ...T.label, fontSize:11, cursor:"pointer" }}>{l}</button>
            ))}
          </div>
        </div>
        <div>
          <Lbl>Specialties</Lbl>
          <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
            {["First-time buyers","Self-employed","Veterans","Luxury","Investment","New construction","Refinance","Down payment assistance"].map(s=>(
              <button key={s} onClick={()=>tog("specialties",s)} style={{ padding:"9px 14px", background:p.specialties.includes(s)?C.ink:"transparent", color:p.specialties.includes(s)?C.white:C.muted, border:`1px solid ${p.specialties.includes(s)?C.ink:C.rule}`, borderRadius:4, ...T.label, fontSize:11, cursor:"pointer" }}>{s}</button>
            ))}
          </div>
        </div>
        <div>
          <Lbl>Languages spoken</Lbl>
          <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
            {["English","Spanish","Mandarin","Vietnamese","Tagalog","Arabic","French","Portuguese","Korean"].map(l=>(
              <button key={l} onClick={()=>tog("languages",l)} style={{ padding:"9px 14px", background:p.languages.includes(l)?C.ink:"transparent", color:p.languages.includes(l)?C.white:C.muted, border:`1px solid ${p.languages.includes(l)?C.ink:C.rule}`, borderRadius:4, ...T.label, fontSize:11, cursor:"pointer" }}>{l}</button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:420, padding:"16px 24px 32px", background:C.white, borderTop:`1px solid ${C.rule}` }}>
        <Btn v="red" onClick={()=>save("production")}>Continue</Btn>
      </div>
    </div>
  );

  if(step==="production") return (
    <div style={{ minHeight:"100vh", background:C.white, padding:"52px 28px 140px" }}>
      <StepHead onBack={()=>setStep("markets")} step={6} total={7}/>
      <div style={{ ...T.label, fontSize:10, color:C.red, marginBottom:14 }}>Step 5 — Production</div>
      <div style={{ ...T.display, fontSize:34, color:C.ink, lineHeight:.95, marginBottom:28 }}>Your numbers<br/>tell the story.</div>
      <div style={{ display:"flex", flexDirection:"column", gap:28 }}>
        <div>
          <Lbl>Average monthly volume</Lbl>
          <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
            {["Under $500K","$500K-$1M","$1M-$2M","$2M-$4M","$4M-$6M","$6M-$10M","$10M+","Not applicable"].map(v=>(
              <button key={v} onClick={()=>upd("volume",v)} style={{ padding:"9px 14px", background:p.volume===v?C.red:"transparent", color:p.volume===v?C.white:C.muted, border:`1px solid ${p.volume===v?C.red:C.rule}`, borderRadius:4, ...T.label, fontSize:11, cursor:"pointer" }}>{v}</button>
            ))}
          </div>
        </div>
        <div>
          <Lbl>Years in mortgage</Lbl>
          <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
            {["Less than 1","1-2","3-5","6-10","11-15","15-20","20+"].map(y=>(
              <button key={y} onClick={()=>upd("experience",y)} style={{ padding:"9px 14px", background:p.experience===y?C.ink:"transparent", color:p.experience===y?C.white:C.muted, border:`1px solid ${p.experience===y?C.ink:C.rule}`, borderRadius:4, ...T.label, fontSize:11, cursor:"pointer" }}>{y} yrs</button>
            ))}
          </div>
        </div>
        {(p.role||p.volume)&&(
          <div style={{ background:C.warm, borderRadius:6, padding:"16px", border:`1px solid ${C.rule}` }}>
            <Lbl>Your profile so far</Lbl>
            {p.role&&<div style={{ ...T.body, fontSize:13, color:C.body, marginBottom:4 }}>Role: <strong>{p.role}</strong></div>}
            {p.compTypes.length>0&&<div style={{ ...T.body, fontSize:13, color:C.body, marginBottom:4 }}>Comp: <strong>{p.compTypes.join(", ")}</strong></div>}
            {p.volume&&<div style={{ ...T.body, fontSize:13, color:C.body }}>Volume: <strong>{p.volume}</strong></div>}
          </div>
        )}
      </div>
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:420, padding:"16px 24px 32px", background:C.white, borderTop:`1px solid ${C.rule}` }}>
        <Btn v="red" onClick={()=>save("privacy")}>Continue</Btn>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:C.white, padding:"52px 28px 48px", display:"flex", flexDirection:"column" }}>
      <StepHead onBack={()=>setStep("production")} step={7} total={7}/>
      <div style={{ flex:1, display:"flex", flexDirection:"column", justifyContent:"center" }}>
        <div style={{ ...T.label, fontSize:10, color:C.red, marginBottom:16 }}>Step 6 — Privacy</div>
        <div style={{ ...T.display, fontSize:40, color:C.ink, lineHeight:.92, marginBottom:14 }}>In mortgage,<br/>everyone knows<br/>everyone.</div>
        <p style={{ ...T.body, fontSize:15, color:C.body, lineHeight:1.7, marginBottom:36 }}>Anonymity Mode means you explore freely. Companies see your production — not your name or employer — until you're ready.</p>
        {[{on:true,label:"Anonymity Mode",desc:"Browse privately. Reveal when you're ready."},{on:false,label:"Public Profile",desc:"Your full profile is visible to all companies."}].map(opt=>(
          <div key={opt.label} onClick={()=>setAnon(opt.on)} style={{ padding:"18px 0", cursor:"pointer", borderBottom:`1px solid ${C.rule}`, display:"flex", gap:16, alignItems:"flex-start" }}>
            <div style={{ width:20, height:20, borderRadius:"50%", border:`2px solid ${anon===opt.on?C.red:C.rule}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:2 }}>
              {anon===opt.on&&<div style={{ width:8, height:8, borderRadius:"50%", background:C.red }}/>}
            </div>
            <div>
              <div style={{ ...T.subhead, fontSize:15, color:C.ink, marginBottom:3 }}>{opt.label}</div>
              <div style={{ ...T.body, fontSize:13, color:C.muted }}>{opt.desc}</div>
            </div>
          </div>
        ))}
        <div style={{ marginTop:32 }}><Btn v="red" onClick={finish}>Enter Orbit</Btn></div>
      </div>
    </div>
  );
}


// ── Profile Edit Helpers ──────────────────────────────────────────────────────

// Collapsible section wrapper
function LOProfileSection({ title, icon, children }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ borderBottom:`1px solid ${C.rule}` }}>
      <div onClick={()=>setOpen(o=>!o)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"16px 0", cursor:"pointer", borderBottom:open?"none":`1px solid transparent` }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ ...T.subhead, fontSize:15, color:C.ink }}>{title}</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ ...T.label, fontSize:9, color:C.red }}>{open?"Done":"Edit"}</div>
          <div style={{ ...T.body, fontSize:14, color:C.muted, transition:"transform .2s", transform:open?"rotate(180deg)":"none" }}>&#8964;</div>
        </div>
      </div>
      {open && (
        <div style={{ paddingBottom:16 }}>
          {children}
        </div>
      )}
    </div>
  );
}

// Single text field edit row
function LOEditRow({ label, value="", onSave, placeholder, multiline, numeric }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value||"");
  const save = () => { onSave(draft.trim()); setEditing(false); };
  return (
    <div style={{ padding:"10px 0", borderBottom:`1px solid ${C.warm}` }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:editing?10:0 }}>
        <div style={{ ...T.label, fontSize:9, color:C.muted, marginTop:2 }}>{label.toUpperCase()}</div>
        {!editing && (
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ ...T.body, fontSize:13, color:value?C.ink:C.ghost, maxWidth:200, textAlign:"right" }}>{value||"Not set"}</div>
            <button onClick={()=>{setDraft(value||"");setEditing(true);}} style={{ background:"none", border:"none", ...T.label, fontSize:9, color:C.red, cursor:"pointer", flexShrink:0 }}>Edit</button>
          </div>
        )}
      </div>
      {editing && (
        <div>
          {multiline ? (
            <textarea value={draft} onChange={e=>setDraft(e.target.value)} placeholder={placeholder} rows={3}
              style={{ width:"100%", background:C.warm, border:`1px solid ${C.rule}`, borderRadius:4, ...T.body, fontSize:14, color:C.ink, outline:"none", resize:"none", lineHeight:1.6, boxSizing:"border-box", padding:"10px 12px" }}/>
          ) : (
            <input value={draft} onChange={e=>setDraft(numeric?e.target.value.replace(/\D/g,""):e.target.value)} placeholder={placeholder}
              inputMode={numeric?"numeric":undefined}
              style={{ width:"100%", background:C.warm, border:`1px solid ${C.rule}`, borderRadius:4, ...T.body, fontSize:14, color:C.ink, outline:"none", padding:"10px 12px", boxSizing:"border-box" }}/>
          )}
          <div style={{ display:"flex", gap:8, marginTop:10 }}>

// Chip selector (single or multi)
function LOChipRow({ label, value, options, onSave, single }) {
  const [editing, setEditing] = useState(false);
  const safeVal = value ?? (single ? "" : []);
  const isArr = Array.isArray(safeVal);
  const [draft, setDraft] = useState(()=>isArr?[...safeVal]:(safeVal?[safeVal]:[]));

  const toggle = opt => {
    if(single) { setDraft([opt]); }
    else { setDraft(prev=>prev.includes(opt)?prev.filter(x=>x!==opt):[...prev,opt]); }
  };

  const save = () => {
    if(single) onSave(draft[0]||"");
    else onSave(draft);
    setEditing(false);
  };

  const displayVal = isArr
    ? (safeVal.length>0?safeVal.slice(0,2).join(", ")+(safeVal.length>2?` +${safeVal.length-2} more`:""):"Not set")
    : (safeVal||"Not set");

  return (
    <div style={{ padding:"10px 0", borderBottom:`1px solid ${C.warm}` }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:editing?12:0 }}>
        <div style={{ ...T.label, fontSize:9, color:C.muted, marginTop:2 }}>{label.toUpperCase()}</div>
        {!editing && (
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ ...T.body, fontSize:13, color:(isArr?safeVal.length>0:safeVal)?C.ink:C.ghost, maxWidth:180, textAlign:"right" }}>{displayVal}</div>
            <button onClick={()=>{setDraft(isArr?[...safeVal]:(safeVal?[safeVal]:[]));setEditing(true);}} style={{ background:"none", border:"none", ...T.label, fontSize:9, color:C.red, cursor:"pointer", flexShrink:0 }}>Edit</button>
          </div>
        )}
      </div>
      {editing && (
        <div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:7, marginBottom:12 }}>
            {options.map(opt=>{
              const sel = draft.includes(opt);
              return (
                <button key={opt} onClick={()=>toggle(opt)} style={{ padding:"9px 14px", background:sel?C.red:"transparent", color:sel?C.white:C.muted, border:`1px solid ${sel?C.red:C.rule}`, borderRadius:4, ...T.label, fontSize:10, cursor:"pointer" }}>{opt}</button>
              );
            })}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={save} style={{ flex:1, padding:"10px", background:C.red, border:"none", borderRadius:4, ...T.label, fontSize:10, color:C.white, cursor:"pointer" }}>Save</button>
            <button onClick={()=>setEditing(false)} style={{ padding:"10px 16px", background:"transparent", border:`1px solid ${C.rule}`, borderRadius:4, ...T.label, fontSize:10, color:C.muted, cursor:"pointer" }}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

// States edit row (uses StateDropdown)
function LOStatesRow({ label, value=[], onSave }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(()=>[...(value||[])]);
  const save = () => { onSave(draft); setEditing(false); };
  return (
    <div style={{ padding:"10px 0", borderBottom:`1px solid ${C.warm}` }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:editing?12:0 }}>
        <div style={{ ...T.label, fontSize:9, color:C.muted, marginTop:2 }}>{label.toUpperCase()}</div>
        {!editing && (
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ ...T.body, fontSize:13, color:(value||[]).length>0?C.ink:C.ghost, maxWidth:180, textAlign:"right" }}>
              {(value||[]).length>0?`${(value||[]).slice(0,2).join(", ")}${(value||[]).length>2?` +${(value||[]).length-2} more`:""}`  : "Not set"}
            </div>
            <button onClick={()=>{setDraft([...(value||[])]);setEditing(true);}} style={{ background:"none", border:"none", ...T.label, fontSize:9, color:C.red, cursor:"pointer", flexShrink:0 }}>Edit</button>
          </div>

      {editing && (

          <div style={{ display:"flex", gap:8, marginTop:12 }}>
            <button onClick={save} style={{ flex:1, padding:"10px", background:C.red, border:"none", borderRadius:4, ...T.label, fontSize:10, color:C.white, cursor:"pointer" }}>Save</button>
            <button onClick={()=>setEditing(false)} style={{ padding:"10px 16px", background:"transparent", border:`1px solid ${C.rule}`, borderRadius:4, ...T.label, fontSize:10, color:C.muted, cursor:"pointer" }}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Company App ───────────────────────────────────────────────────────────────
function CompanyApp({ user, isPinnacle=false, onSignOut }) {
  const [tab, setTab] = useState("browse");
  const [coP, setCoP] = useState(()=>{
    const saved = LS.get("orbit_co_profile",{});
    return {
      companyName:"", type:"Independent Broker", remote:"Hybrid", culture:"",
      hiring:[], compOffered:[], minVolume:"", loanTypes:[], states:[],
      companyNmls:"", founded:"",
      contactFirst:"", contactLast:"", contactTitle:"", contactEmail:"", contactPhone:"",
      linkedinUrl:"", instagramUrl:"", facebookUrl:"", websiteUrl:"",
      googleUrl:"", experienceUrl:"",
      ...saved,
      hiring: Array.isArray(saved.hiring) ? saved.hiring : [],
      compOffered: Array.isArray(saved.compOffered) ? saved.compOffered : [],
      loanTypes: Array.isArray(saved.loanTypes) ? saved.loanTypes : [],
      states: Array.isArray(saved.states) ? saved.states : [],
    };
  });
  const [candIdx, setCandIdx] = useState(0);
  const [pipeline, setPipeline] = useState(()=>LS.get("orbit_co_pipeline",[
    { ...MOCK_SEEKERS[0], status:"interested", mid:"m1" },
    { ...MOCK_SEEKERS[2], status:"interview",  mid:"m2" },
  ]));
  const [showMatch, setShowMatch] = useState(null);
  const [showPaywall, setShowPaywall] = useState(false);
  const [chatParty, setChatParty] = useState(null);
  const [chatMid, setChatMid] = useState(null);
  const [schedParty, setSchedParty] = useState(null);
  const [showSched, setShowSched] = useState(false);
  const [interviews, setInterviews] = useState(()=>LS.get("orbit_co_interviews",[]));
  const [openPost, setOpenPost] = useState(null);
  const [posts, setPosts] = useState(()=>LS.get("orbit_community_posts")||SEED_POSTS.map(p=>({...p,liked:false})));
  const [replies, setReplies] = useState(()=>LS.get("orbit_post_replies",SEED_REPLIES));
  const [likedP, setLikedP] = useState(()=>LS.get("orbit_liked_posts",{}));
  const [newsTab, setNewsTab] = useState("feed");
  const [catFilter, setCatFilter] = useState("All");
  const [compose, setCompose] = useState(false);
  const [newPost, setNewPost] = useState("");

  const deck = MOCK_SEEKERS.slice(candIdx);
  const swipe=(dir,seeker)=>{ if(dir==="right"){ if(!isPinnacle){ setShowPaywall(true); return; } const m={...seeker,status:"new",mid:`m-${Date.now()}`}; const np=[...pipeline,m]; setPipeline(np); LS.set("orbit_co_pipeline",np); setShowMatch(seeker); } setCandIdx(i=>i+1); };
  const toggleLike=id=>{ const u={...likedP,[id]:!likedP[id]}; setLikedP(u); LS.set("orbit_liked_posts",u); };
  const addPost=()=>{ if(!newPost.trim()) return; const post={id:"p-"+Date.now(),author:`${coP.companyName||"Your Company"}, Hiring`,role:"Hiring Manager",time:"Just now",cat:"Career",text:newPost.trim(),likes:0,replies:0}; const u=[post,...posts]; setPosts(u); LS.set("orbit_community_posts",u); setNewPost(""); setCompose(false); };
  const addReply=(pid,reply)=>{ const u={...replies,[pid]:[...(replies[pid]||[]),reply]}; setReplies(u); LS.set("orbit_post_replies",u); };
  const updCoP=upd=>{ const u={...coP,...upd}; setCoP(u); LS.set("orbit_co_profile",u); };

  if(chatParty) return <ChatScreen matchId={chatMid||"co-chat"} party={chatParty} onBack={()=>setChatParty(null)} onSchedule={p=>{setChatParty(null);setSchedParty(p);setShowSched(true);}}/>;
  if(openPost) return <PostDetail post={openPost} replies={replies[openPost.id]||[]} onBack={()=>setOpenPost(null)} currentUser={user} onAddReply={addReply}/>;

  const STATUS={ new:{label:"New",color:C.ink,bg:C.warm}, interested:{label:"Interested",color:C.red,bg:C.redSoft}, interview:{label:"Interview",color:C.green,bg:C.greenSoft} };
  const TABS=[{id:"browse",label:"Browse"},{id:"pipeline",label:"Pipeline"},{id:"community",label:"Community"},{id:"profile",label:"Company"}];

  return (
    <div style={{ paddingBottom:tab==="browse"?0:80, minHeight:"100vh", background:C.off, maxWidth:420, margin:"0 auto" }}>

      {tab==="browse"&&(
        <div style={{ display:"flex", flexDirection:"column", height:"100vh" }}>
          <div style={{ background:C.white, padding:"52px 22px 12px", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`1px solid ${C.rule}` }}>
            <Logo size="sm"/>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              {isPinnacle&&<div style={{ display:"inline-flex", alignItems:"center", gap:5, background:C.goldSoft, border:`1px solid ${C.goldRule}`, borderRadius:20, padding:"4px 11px" }}><div style={{ width:7, height:7, borderRadius:"50%", background:C.gold }}/><div style={{ ...T.label, fontSize:8, color:C.gold }}>Pinnacle</div></div>}
              <div style={{ ...T.label, fontSize:9, color:C.muted }}>{deck.length} left</div>
            </div>
          </div>
          {deck.length===0?(
            <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:40, textAlign:"center" }}>
              <div style={{ ...T.display, fontSize:30, color:C.ink, lineHeight:1, marginBottom:10 }}>You've seen<br/>everyone.</div>
              <Btn v="soft" onClick={()=>setTab("pipeline")} s={{ maxWidth:220, marginTop:16 }}>See pipeline</Btn>
            </div>
          ):(
            <>
              <div style={{ flex:1, position:"relative", padding:"10px 16px 8px", minHeight:0 }}>
                {deck.length>1&&<div style={{ position:"absolute", inset:"18px 26px 0", background:C.white, borderRadius:8, border:`1px solid ${C.rule}`, transform:"scale(.97) translateY(6px)", zIndex:1 }}/>}
                {deck.slice(0,2).reverse().map((s,i)=>(
                  <SeekerCard key={s.id+"-"+i} seeker={s} isTop={i===Math.min(deck.length,2)-1} onSwipe={swipe}/>
                ))}
              </div>

  if(step==="hero") return (
    <div style={{ minHeight:"100vh", background:C.white, display:"flex", flexDirection:"column" }}>
      <div style={{ background:C.ink, padding:"52px 28px 40px", flex:1, display:"flex", flexDirection:"column", justifyContent:"flex-end" }}>
        <div style={{ ...T.label, fontSize:10, color:"rgba(255,255,255,.35)", marginBottom:16 }}>This is where careers begin.</div>
        <div style={{ ...T.display, fontSize:44, color:C.white, lineHeight:.9, marginBottom:16 }}>Every great<br/>loan officer<br/>started<br/><span style={{ color:C.red }}>right here.</span></div>
        <p style={{ ...T.body, fontSize:15, color:"rgba(255,255,255,.55)", lineHeight:1.7, marginBottom:36 }}>The mortgage industry puts more families in homes than any other profession in America.</p>
        <Btn v="red" onClick={()=>setStep("safe")}>Show me how</Btn>
        <button onClick={onDone} style={{ background:"none", border:"none", ...T.caption, fontSize:13, color:"rgba(255,255,255,.3)", padding:"12px", cursor:"pointer", marginTop:4 }}>Already licensed? Create an account</button>
      </div>
    </div>
  );
  return (
    <div style={{ minHeight:"100vh", background:C.white, padding:"52px 28px 48px", display:"flex", flexDirection:"column" }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:32 }}>
        <BackBtn onClick={()=>setStep("hero")}/><Logo size="sm"/>
      </div>
      <div style={{ ...T.label, fontSize:10, color:C.red, marginBottom:14 }}>Get Licensed</div>
      <div style={{ ...T.display, fontSize:36, color:C.ink, lineHeight:.95, marginBottom:14 }}>Start your<br/>mortgage career.</div>
      <p style={{ ...T.body, fontSize:14, color:C.body, lineHeight:1.7, marginBottom:28 }}>Complete the 20-hour SAFE Act course to get your NMLS license. RocketPro University makes it free and self-paced.</p>
      {[{n:"20",u:"hours",l:"SAFE Act pre-licensing"},{n:"50",u:"states",l:"License anywhere"},{n:"Free",u:"",l:"Through RocketPro University"}].map((s,i)=>(
        <div key={i} style={{ padding:"18px 0", borderBottom:`1px solid ${C.rule}`, display:"flex", gap:16, alignItems:"center" }}>
          <div style={{ flexShrink:0, minWidth:60 }}>
            <div style={{ ...T.display, fontSize:32, color:C.red, lineHeight:1 }}>{s.n}</div>
            {s.u&&<div style={{ ...T.label, fontSize:8, color:C.muted }}>{s.u.toUpperCase()}</div>}
          </div>
          <div style={{ ...T.body, fontSize:14, color:C.body }}>{s.l}</div>
        </div>
      ))}
      <div style={{ marginTop:32, display:"flex", flexDirection:"column", gap:10 }}>
        <a href="https://university.rocketpro.com" target="_blank" rel="noreferrer" style={{ display:"block", textDecoration:"none" }}><Btn v="red">Start at RocketPro University</Btn></a>
        <button onClick={onDone} style={{ background:"none", border:`1px solid ${C.rule}`, borderRadius:4, padding:"13px", width:"100%", cursor:"pointer", ...T.body, fontSize:14, color:C.muted }}>I already have my license</button>
      </div>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState(()=>{
    const u = LS.get("orbit_user");
    return u ? "app" : "home";
  });
  const [user, setUser] = useState(()=>LS.get("orbit_user"));
  const [accountType, setAccountType] = useState(null);

  const signOut=()=>{ LS.del("orbit_user"); setUser(null); setScreen("home"); };

  const afterSignIn=u=>{ setUser(u); setScreen("app"); };
  const afterCreate=u=>{ setUser(u); setScreen("verify"); };
  const afterVerify=u=>{ setUser(u); if(u.accountType==="lo") setScreen("lo-onboard"); else setScreen("co-onboard"); };

  // Auto-route returning users
  if(screen==="app" && user) {
    if(user.pinnacle) return <CompanyApp user={user} isPinnacle={true} onSignOut={signOut}/>;
    if(user.accountType==="company") return <CompanyApp user={user} isPinnacle={false} onSignOut={signOut}/>;
    const loP = LS.get("orbit_lo_profile");
    if(loP && loP.role) return <LOApp user={user} onSignOut={signOut}/>;
    return <LOOnboard user={user} onDone={()=>setScreen("lo-app")}/>;
  }

  return (
    <div style={{ maxWidth:420, margin:"0 auto", minHeight:"100vh", background:C.white }}>
      {screen==="home"&&<HomeScreen onCreateAccount={()=>setScreen("account-type")} onSignIn={()=>setScreen("signin")} onAspiring={()=>setScreen("aspiring")}/>}
      {screen==="account-type"&&<AccountTypeScreen onBack={()=>setScreen("home")} onSelectLO={()=>{setAccountType("lo");setScreen("create-account");}} onSelectCompany={()=>{setAccountType("company");setScreen("create-account");}}/>}
      {screen==="create-account"&&<CreateAccountScreen onBack={()=>setScreen("account-type")} accountType={accountType} onDone={afterCreate}/>}
      {screen==="verify"&&<VerifyEmailScreen user={user} onVerified={afterVerify} onSkip={()=>afterVerify({...user,verified:false})}/>}
      {screen==="signin"&&<SignInScreen onBack={()=>setScreen("home")} onSignedIn={afterSignIn} onCreateAccount={()=>setScreen("account-type")}/>}
      {screen==="lo-onboard"&&<LOOnboard user={user} onDone={()=>setScreen("lo-app")}/>}
      {screen==="lo-app"&&<LOApp user={user} onSignOut={signOut}/>}
      {screen==="co-onboard"&&<CompanyOnboard user={user} onDone={()=>setScreen("co-app")} onDonePinnacle={()=>setScreen("co-pinnacle")}/>}
      {screen==="co-app"&&<CompanyApp user={user} isPinnacle={false} onSignOut={signOut}/>}
      {screen==="co-pinnacle"&&<CompanyApp user={user} isPinnacle={true} onSignOut={signOut}/>}
      {screen==="aspiring"&&<AspiringLO onDone={()=>setScreen("account-type")}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
