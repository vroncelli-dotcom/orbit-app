const Btn = ({ children, v="red", onClick, disabled, s={} }) => {
  const V = {
    red:    { background:C.red,     color:C.white, border:"none",                  boxShadow:"0 2px 14px rgba(232,37,26,.28)" },
    outline:{ background:C.white,   color:C.ink,   border:`1.5px solid ${C.rule}`, boxShadow:"none" },
    ghost:  { background:C.warm,    color:C.body,  border:`1px solid ${C.rule}`,   boxShadow:"none" },
    navy:   { background:C.navy,    color:C.white, border:"none",                  boxShadow:"0 2px 12px rgba(0,48,87,.2)" },
    gold:   { background:C.gold,    color:C.white, border:"none",                  boxShadow:"0 2px 12px rgba(201,146,42,.3)" },
    soft:   { background:C.redSoft, color:C.red,   border:`1px solid ${C.redMid}`, boxShadow:"none" },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width:"100%", padding:"15px 20px", borderRadius:4,
      fontFamily:"Inter,sans-serif", fontWeight:600, fontSize:15,
      cursor:disabled?"not-allowed":"pointer", opacity:disabled?.45:1,
      transition:"opacity .15s", ...V[v], ...s,
    }}>{children}</button>
  );
};

// ─── CHAT SCREEN ─────────────────────────────────────────────────────────────
function ChatScreen({ party, onBack, onSchedule, isCompany }) {
  const [messages, setMessages] = useState(MSGS);
  const [input, setInput] = useState("");
  const bottomRef = useRef();
  useEffect(()=>{ bottomRef.current?.scrollIntoView({ behavior:"smooth" }); },[messages]);
  const send = () => {
    if (!input.trim()) return;
    setMessages(m=>[...m,{ from:"me",text:input.trim(),time:"Now" }]);
    setInput("");
  };
  const name = isCompany ? (party.alias||party.role) : party.name;

  return (
    <div style={{ display:"flex",flexDirection:"column",height:"100vh",maxWidth:420,margin:"0 auto",background:C.off }}>
      {/* Header */}
      <div style={{ background:C.white,padding:"52px 20px 14px",display:"flex",alignItems:"center",gap:14,borderBottom:`1px solid ${C.rule}` }}>
        <button onClick={onBack} style={{ background:"none",border:"none",color:C.red,fontSize:22,cursor:"pointer",lineHeight:1,padding:"0 4px" }}>←</button>
        <div style={{ flex:1 }}>
          <div style={{ ...T.heading,fontSize:16,color:C.ink }}>{name}</div>
          <div style={{ ...T.label,fontSize:9,color:C.green,marginTop:2 }}>Online now</div>
        </div>
        <button onClick={()=>onSchedule(party)} style={{ background:"none",border:`1px solid ${C.rule}`,borderRadius:4,padding:"9px 16px",...T.label,fontSize:11,color:C.ink,cursor:"pointer" }}>Schedule</button>
        <button onClick={onBack} style={{ background:"none",border:`1px solid ${C.redMid}`,borderRadius:4,padding:"9px 12px",...T.label,fontSize:11,color:C.red,cursor:"pointer",marginLeft:4 }}>End</button>
      </div>

      {/* Messages */}
      <div style={{ flex:1,overflowY:"auto",padding:"20px 16px",display:"flex",flexDirection:"column",gap:12 }}>
        <div style={{ textAlign:"center",...T.label,fontSize:9,color:C.muted,marginBottom:4 }}>Today · Matched on Orbit</div>
        {messages.map((msg,i)=>(
          <div key={i} style={{ display:"flex",justifyContent:msg.from==="me"?"flex-end":"flex-start" }}>
            <div style={{ maxWidth:"78%" }}>
              <div style={{
                padding:"12px 16px",
                background:msg.from==="me"?C.red:C.white,
                color:msg.from==="me"?C.white:C.ink,
                borderRadius:msg.from==="me"?"16px 16px 2px 16px":"16px 16px 16px 2px",
                ...T.body,fontSize:14,lineHeight:1.5,
                boxShadow:msg.from==="me"?"none":"0 1px 6px rgba(0,0,0,.06)",
              }}>{msg.text}</div>
              <div style={{ ...T.caption,fontSize:10,color:C.muted,marginTop:4,textAlign:msg.from==="me"?"right":"left" }}>{msg.time}</div>
            </div>
          </div>
        ))}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      <div style={{ padding:"12px 16px 32px",background:C.white,borderTop:`1px solid ${C.rule}`,display:"flex",gap:10,alignItems:"flex-end" }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Type a message…"
          style={{ flex:1,padding:"12px 0",background:"transparent",border:"none",borderBottom:`1px solid ${C.rule}`,...T.body,fontSize:14,color:C.ink,outline:"none" }}/>
        <button onClick={send} style={{ width:42,height:42,borderRadius:"50%",background:input.trim()?C.red:C.rule,border:"none",color:C.white,fontSize:16,flexShrink:0,cursor:"pointer",transition:"background .2s" }}>↑</button>
      </div>
    </div>
  );
}

// ─── SWIPE CARD ───────────────────────────────────────────────────────────────
function CompanyCard({ co, onSwipe, isTop, offset=0 }) {
  const [dragX, setDragX] = useState(0);
  const [dragging, setDragging] = useState(false);
  const [tab, setTab] = useState("story");
  const startX = useRef(0);

  const dn = x => { setDragging(true); startX.current=x; };
  const mv = x => { if(dragging) setDragX(x-startX.current); };
  const up = () => {
    if(!dragging) return; setDragging(false);
    if(dragX>50) onSwipe("right");
    else if(dragX<-50) onSwipe("left");
    else setDragX(0);
  };

  return (
    <div
      onMouseDown={e=>dn(e.clientX)} onMouseMove={e=>mv(e.clientX)} onMouseUp={up} onMouseLeave={up}
      onTouchStart={e=>dn(e.touches[0].clientX)} onTouchMove={e=>mv(e.touches[0].clientX)} onTouchEnd={up}
      style={{
        position:"absolute", inset:0,
        transform:`translateX(${isTop?dragX:0}px) rotate(${isTop?dragX*.024:0}deg) scale(${isTop?1:0.97}) translateY(${offset}px)`,
        transition:dragging?"none":"transform .32s cubic-bezier(.34,1.56,.64,1)",
        cursor:isTop?"grab":"default", userSelect:"none",
        zIndex:isTop?10:5,
      }}
    >

// ─── CANDIDATE CARD ───────────────────────────────────────────────────────────
function CandidateCard({ c, onSwipe, isTop }) {
  const [dragX, setDragX] = useState(0);
  const [dragging, setDragging] = useState(false);
  const startX = useRef(0);
  const dn = x => { setDragging(true); startX.current=x; };
  const mv = x => { if(dragging) setDragX(x-startX.current); };
  const up = () => {
    if(!dragging) return; setDragging(false);
    if(dragX>50) onSwipe("right",c);
    else if(dragX<-50) onSwipe("left",c);
    else setDragX(0);
  };

  return (
    <div
      onMouseDown={e=>dn(e.clientX)} onMouseMove={e=>mv(e.clientX)} onMouseUp={up} onMouseLeave={up}
      onTouchStart={e=>dn(e.touches[0].clientX)} onTouchMove={e=>mv(e.touches[0].clientX)} onTouchEnd={up}
      style={{
        position:"absolute",inset:0,
        transform:`translateX(${isTop?dragX:0}px) rotate(${isTop?dragX*.024:0}deg) scale(${isTop?1:0.97})`,
        transition:dragging?"none":"transform .32s cubic-bezier(.34,1.56,.64,1)",
        cursor:isTop?"grab":"default",userSelect:"none",zIndex:isTop?10:5,
      }}
    >
      {isTop&&dragX>25 && <div style={{ position:"absolute",top:18,left:16,zIndex:20,background:C.white,border:`2px solid ${C.green}`,color:C.green,padding:"5px 16px",borderRadius:4,...T.label,fontSize:12,opacity:Math.min(dragX/50,1) }}>Interested</div>}
      {isTop&&dragX<-25 && <div style={{ position:"absolute",top:18,right:16,zIndex:20,background:C.white,border:`2px solid ${C.ghost}`,color:C.muted,padding:"5px 16px",borderRadius:4,...T.label,fontSize:12,opacity:Math.min(-dragX/50,1) }}>Pass</div>}

      <div style={{ height:"100%",background:C.white,borderRadius:8,boxShadow:"0 4px 24px rgba(0,0,0,.1)",overflow:"hidden",display:"flex",flexDirection:"column",border:`1px solid ${C.rule}` }}>
        <div style={{ background:C.ink,padding:"28px 20px 20px",flexShrink:0,minHeight:175 }}>
          <div style={{ ...T.label,fontSize:8,color:"rgba(255,255,255,.3)",marginBottom:10 }}>{c.role.toUpperCase()} · {c.style.toUpperCase()}</div>
          <div style={{ ...T.display,fontSize:28,color:C.white,lineHeight:.95,marginBottom:14 }}>{c.alias}</div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12 }}>
            {[["Volume",c.volume],["Exp",c.exp],["NMLS",c.nmls]].map(([l,v])=>(
              <div key={l}>
                <div style={{ ...T.label,fontSize:8,color:"rgba(255,255,255,.32)",marginBottom:2 }}>{l}</div>
                <div style={{ ...T.subhead,fontSize:12,color:l==="NMLS"&&v==="Verified"?"#5CFFA1":C.white }}>{v}{l==="NMLS"&&v==="Verified"?" ✓":""}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:14 }}>
          <div><Lbl>Their story</Lbl><p style={{ ...T.body,fontSize:13,color:C.body }}>{c.bio}</p></div>
          <Rule/>
          <div>
            <Lbl>Client reviews</Lbl>
            <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:8 }}>
              <span style={{ ...T.label,fontSize:9,color:C.muted,minWidth:88 }}>Google</span>

// ─── SIGN IN SCREEN ──────────────────────────────────────────────────────────
function SignInScreen({ onBack, onSignedInLO, onSignedInCompany, onSignedInPinnacle }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [showPass, setShowPass] = useState(false);

  const submit = () => {
    if (!email.trim() || !password.trim()) { setError("Please enter your email and password."); return; }
    setLoading(true); setError("");
    setTimeout(() => {
      setLoading(false);
      // Demo routing based on email
      if (email.includes("pinnacle") || email.includes("3030")) onSignedInPinnacle();
      else if (email.includes("company") || email.includes("broker")) onSignedInCompany();
      else onSignedInLO();
    }, 1600);
  };

  return (
    <div style={{ minHeight:"100vh", background:C.white, padding:"52px 28px 48px", display:"flex", flexDirection:"column" }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:48 }}>
        <button onClick={onBack} style={{ background:"none", border:"none", color:C.red, fontSize:22, cursor:"pointer", lineHeight:1 }}>&#8592;</button>
        <Logo size="sm"/>
      </div>
      <div style={{ ...T.label, fontSize:10, color:C.red, marginBottom:14 }}>Welcome back</div>
      <div style={{ ...T.display, fontSize:40, color:C.ink, lineHeight:.92, marginBottom:12 }}>Sign in to<br/>Orbit.</div>
      <p style={{ ...T.body, fontSize:14, color:C.body, lineHeight:1.7, marginBottom:40 }}>
        Enter your email and password to pick up where you left off.
      </p>

      <div style={{ display:"flex", flexDirection:"column", gap:24, marginBottom:8 }}>
        <div>
          <Lbl>Email address</Lbl>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" type="email"
            style={{ width:"100%", background:"transparent", border:"none", outline:"none", borderBottom:`2px solid ${email?C.red:C.rule}`, ...T.body, fontSize:18, color:C.ink, padding:"8px 0", boxSizing:"border-box" }}/>
        </div>
        <div>
          <Lbl>Password</Lbl>
          <div style={{ display:"flex", alignItems:"center", borderBottom:`2px solid ${password?C.red:C.rule}` }}>
            <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" type={showPass?"text":"password"}
              onKeyDown={e=>e.key==="Enter"&&submit()}
              style={{ flex:1, background:"transparent", border:"none", outline:"none", ...T.body, fontSize:18, color:C.ink, padding:"8px 0", boxSizing:"border-box" }}/>
            <button onClick={()=>setShowPass(s=>!s)} style={{ background:"none", border:"none", ...T.label, fontSize:9, color:C.muted, cursor:"pointer", flexShrink:0 }}>{showPass?"Hide":"Show"}</button>
          </div>
        </div>
      </div>

      {error && <div style={{ ...T.body, fontSize:13, color:C.red, marginBottom:12, paddingTop:4 }}>{error}</div>}

      <div style={{ marginBottom:14 }}>
        <button style={{ background:"none", border:"none", ...T.label, fontSize:10, color:C.red, cursor:"pointer", padding:0 }}>
          Forgot password?
        </button>
      </div>

      {loading ? (
        <div style={{ padding:"20px 0", textAlign:"center" }}>
          <div style={{ display:"flex", justifyContent:"center", gap:8, marginBottom:10 }}>
            {[0,1,2].map(i=><div key={i} style={{ width:9, height:9, borderRadius:"50%", background:C.red, opacity:0.2+i*0.4 }}/>)}
          </div>
          <div style={{ ...T.label, fontSize:9, color:C.muted }}>Signing you in...</div>
        </div>
      ) : (
        <Btn v="red" onClick={submit} disabled={!email.trim()||!password.trim()}>Sign in</Btn>
      )}

      <div style={{ marginTop:20, textAlign:"center" }}>
        <div style={{ ...T.body, fontSize:14, color:C.muted }}>
          New to Orbit?{" "}
          <button onClick={onBack} style={{ background:"none", border:"none", ...T.subhead, fontSize:14, color:C.red, cursor:"pointer", padding:0 }}>
            Create an account
          </button>
        </div>
      </div>

      {/* Demo hint */}
      <div style={{ marginTop:28, padding:"14px 16px", background:C.warm, borderRadius:6, border:`1px solid ${C.rule}` }}>
        <div style={{ ...T.label, fontSize:8, color:C.muted, marginBottom:6 }}>Demo Login Hints</div>
        <div style={{ ...T.caption, fontSize:11, color:C.muted, lineHeight:1.6 }}>
          Any email with "company" → company app<br/>
          Any email with "pinnacle" → Pinnacle experience<br/>
          Anything else → LO experience
        </div>
      </div>
    </div>
  );
}

}

function PostDetailScreen({ post, onBack, isCompany }) {

  const toggleReplyLike = id => {
    setReplyLikes(prev => {
      const wasLiked = prev[id];
      return { ...prev, [id]: !wasLiked };

    setReplies(prev => prev.map(r => r.id===id ? { ...r, likes: replyLikes[id] ? r.likes-1 : r.likes+1 } : r));

      likes: 0,
      liked: false,

    setReplies(prev => [...prev, newR]);
    setNewReply("");
    setTimeout(() => bottomRef.current?.scrollIntoView({ behavior:"smooth" }), 100);

  const catColor = post.cat==="Win"?C.red:post.cat==="Advice"?C.green:C.muted;

        {/* Original post */}
        <div style={{ padding:"20px 0", borderBottom:`1px solid ${C.rule}` }}>

              <span style={{ fontSize:18, color:liked?C.red:C.ghost }}>{liked?"♥":"♡"}</span>

      </div>

      <div style={{ position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,padding:"16px 24px 32px",background:C.white,borderTop:`1px solid ${C.rule}` }}>
        <Btn v="red" onClick={()=>setStep("comp")} disabled={!profile.role}>Continue</Btn>

    </div>

  // ── 3b. Compensation ──
  if (step==="comp") return (
    <div style={{ minHeight:"100vh",background:C.white,padding:"52px 28px 120px" }}>
      <StepHeader back="profile1" s={3} total={6} label="Compensation"/>
      <div style={{ ...T.label,fontSize:10,color:C.red,marginBottom:14 }}>Step 3 — Compensation</div>
      <div style={{ ...T.display,fontSize:34,color:C.ink,lineHeight:.95,marginBottom:10 }}>What are you<br/>looking for?</div>
      <p style={{ ...T.body,fontSize:14,color:C.muted,lineHeight:1.6,marginBottom:28 }}>Select everything that applies. There are no wrong answers.</p>

      <div style={{ display:"flex",flexDirection:"column",gap:28 }}>
        <div>
          <Lbl>Compensation types I'm open to</Lbl>

            {[
              {v:"W2 Salary",     hint:"Base salary from employer"},
              {v:"1099 Commission",hint:"Self-employed, you pay your own taxes"},
              {v:"Base + Commission",hint:"Salary plus performance pay"},
              {v:"Revenue Share", hint:"Earn a cut of team production"},
              {v:"Hourly",        hint:"Paid by the hour"},
              {v:"Open to All",   hint:"No preference"},
            ].map(({v,hint})=>(
              <div key={v} style={{ width:"100%" }}>
                <button onClick={()=>toggleArr("compTypes",v)} style={{ width:"100%",padding:"12px 16px",background:profile.compTypes.includes(v)?C.red:"transparent",color:profile.compTypes.includes(v)?C.white:C.ink,border:`1px solid ${profile.compTypes.includes(v)?C.red:C.rule}`,borderRadius:4,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center" }}>

        </div>

        <div>
          <Lbl>Minimum I'd consider</Lbl>
          <div style={{ display:"flex",flexWrap:"wrap",gap:7 }}>
            {["50%+ split","65%+ split","75%+ split","80%+ split","$60K+ base","$80K+ base","$100K+ base","Negotiable"].map(c=>(
              <button key={c} onClick={()=>setProfile(p=>({...p,minComp:c}))} style={{ padding:"10px 14px",background:profile.minComp===c?C.ink:"transparent",color:profile.minComp===c?C.white:C.muted,border:`1px solid ${profile.minComp===c?C.ink:C.rule}`,borderRadius:4,...T.label,fontSize:11,cursor:"pointer" }}>{c}</button>

        </div>
      </div>

      <div style={{ position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,padding:"16px 24px 32px",background:C.white,borderTop:`1px solid ${C.rule}` }}>
        <Btn v="red" onClick={()=>setStep("profile2")} disabled={!profile.compTypes.length}>Continue</Btn>
      </div>
    </div>
  );

  // ── 4. Profile — Specialties & Markets ──
  if (step==="profile2") return (
    <div style={{ minHeight:"100vh",background:C.white,padding:"52px 28px 120px" }}>
      <StepHeader back="comp" s={4} total={6} label="Specialties"/>
      <div style={{ ...T.label,fontSize:10,color:C.red,marginBottom:14 }}>Step 3 — Markets & Specialties</div>
      <div style={{ ...T.display,fontSize:34,color:C.ink,lineHeight:.95,marginBottom:28 }}>Tell us what<br/>you're great at.</div>

      <div style={{ display:"flex",flexDirection:"column",gap:28 }}>

        <div>
          <Lbl>States licensed in</Lbl>

        </div>

        {/* Loan types */}
        <div>
          <Lbl>Loan types (select all)</Lbl>
          <div style={{ display:"flex",flexWrap:"wrap",gap:7 }}>
            {["Conventional","FHA","VA","USDA","Jumbo","Non-QM","Construction","HELOC","Reverse","Commercial"].map(l=>(
              <button key={l} onClick={()=>toggleArr("loanTypes",l)} style={{ padding:"9px 14px",background:profile.loanTypes.includes(l)?C.red:"transparent",color:profile.loanTypes.includes(l)?C.white:C.muted,border:`1px solid ${profile.loanTypes.includes(l)?C.red:C.rule}`,borderRadius:4,...T.label,fontSize:9,cursor:"pointer" }}>{l}</button>
            ))}
          </div>
        </div>

        {/* Specialties / niche */}
        <div>
          <Lbl>Niche or specialty</Lbl>
          <div style={{ display:"flex",flexWrap:"wrap",gap:7 }}>
            {["First-time buyers","Self-employed","Veterans","Luxury","Investment","New construction","Refinance","Down payment assistance"].map(s=>(
              <button key={s} onClick={()=>toggleArr("specialties",s)} style={{ padding:"9px 14px",background:profile.specialties.includes(s)?C.ink:"transparent",color:profile.specialties.includes(s)?C.white:C.muted,border:`1px solid ${profile.specialties.includes(s)?C.ink:C.rule}`,borderRadius:4,...T.label,fontSize:9,cursor:"pointer" }}>{s}</button>
            ))}
          </div>
        </div>

        {/* Languages */}
        <div>
          <Lbl>Languages spoken</Lbl>
          <div style={{ display:"flex",flexWrap:"wrap",gap:7 }}>
            {["English","Spanish","Mandarin","Vietnamese","Tagalog","Arabic","French","Portuguese","Korean"].map(l=>(
              <button key={l} onClick={()=>toggleArr("languages",l)} style={{ padding:"9px 14px",background:profile.languages.includes(l)?C.ink:"transparent",color:profile.languages.includes(l)?C.white:C.muted,border:`1px solid ${profile.languages.includes(l)?C.ink:C.rule}`,borderRadius:4,...T.label,fontSize:9,cursor:"pointer" }}>{l}</button>
            ))}

        </div>
      </div>

      <div style={{ position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,padding:"16px 24px 32px",background:C.white,borderTop:`1px solid ${C.rule}` }}>
        <Btn v="red" onClick={()=>setStep("profile3")}>Continue</Btn>
      </div>
    </div>
  );

  // ── 5. Profile — Production & Experience ──
  if (step==="profile3") return (
    <div style={{ minHeight:"100vh",background:C.white,padding:"52px 28px 120px" }}>
      <StepHeader back="profile2" s={5} total={6} label="Production"/>
      <div style={{ ...T.label,fontSize:10,color:C.red,marginBottom:14 }}>Step 4 — Production</div>
      <div style={{ ...T.display,fontSize:34,color:C.ink,lineHeight:.95,marginBottom:28 }}>Your numbers<br/>tell the story.</div>

      <div style={{ display:"flex",flexDirection:"column",gap:28 }}>
        {/* Monthly volume */}
        <div>
          <Lbl>Average monthly volume</Lbl>
          <div style={{ display:"flex",flexWrap:"wrap",gap:7 }}>
            {["Under $500K","$500K – $1M","$1M – $2M","$2M – $4M","$4M – $6M","$6M – $10M","$10M+","Not applicable"].map(v=>(
              <button key={v} onClick={()=>setProfile(p=>({...p,volume:v}))} style={{ padding:"9px 14px",background:profile.volume===v?C.red:"transparent",color:profile.volume===v?C.white:C.muted,border:`1px solid ${profile.volume===v?C.red:C.rule}`,borderRadius:4,...T.label,fontSize:9,cursor:"pointer" }}>{v}</button>
            ))}
          </div>
        </div>

        {/* Years experience */}
        <div>
          <Lbl>Years in mortgage</Lbl>
          <div style={{ display:"flex",flexWrap:"wrap",gap:7 }}>
            {["Less than 1","1–2","3–5","6–10","11–15","15–20","20+"].map(y=>(
              <button key={y} onClick={()=>setProfile(p=>({...p,experience:y}))} style={{ padding:"9px 14px",background:profile.experience===y?C.ink:"transparent",color:profile.experience===y?C.white:C.muted,border:`1px solid ${profile.experience===y?C.ink:C.rule}`,borderRadius:4,...T.label,fontSize:9,cursor:"pointer" }}>{y} yrs</button>
            ))}
          </div>
        </div>

        {/* Summary preview */}
        {(profile.role || profile.volume) && (
          <div style={{ background:C.warm,borderRadius:6,padding:"16px",border:`1px solid ${C.rule}` }}>
            <Lbl>Your profile so far</Lbl>
            <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
              {profile.role && <div style={{ ...T.body,fontSize:13,color:C.body }}>Role: <strong>{profile.role}</strong></div>}
              {profile.compTypes.length>0 && <div style={{ ...T.body,fontSize:13,color:C.body }}>Comp: <strong>{profile.compTypes.join(", ")}</strong></div>}
              {profile.style && <div style={{ ...T.body,fontSize:13,color:C.body }}>Style: <strong>{profile.style}</strong></div>}
              {profile.states.length>0 && <div style={{ ...T.body,fontSize:13,color:C.body }}>States: <strong>{profile.states.join(", ")}</strong></div>}
              {profile.volume && <div style={{ ...T.body,fontSize:13,color:C.body }}>Volume: <strong>{profile.volume}</strong></div>}
            </div>
          </div>
        )}
      </div>

      <div style={{ position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,padding:"16px 24px 32px",background:C.white,borderTop:`1px solid ${C.rule}` }}>
        <Btn v="red" onClick={()=>setStep("privacy")}>Continue</Btn>
      </div>
    </div>
  );

  // ── 6. Privacy ──
  return (
    <div style={{ minHeight:"100vh",background:C.white,padding:"52px 28px 48px",display:"flex",flexDirection:"column" }}>
      <StepHeader back="profile3" s={6} total={6} label="Privacy"/>
      <div style={{ flex:1,display:"flex",flexDirection:"column",justifyContent:"center" }}>
        <div style={{ ...T.label,fontSize:10,color:C.red,marginBottom:16 }}>Step 5 — Privacy</div>
        <div style={{ ...T.display,fontSize:40,color:C.ink,lineHeight:.92,marginBottom:14 }}>
          In mortgage,<br/>everyone knows<br/>everyone.
        </div>
        <p style={{ ...T.body,fontSize:15,color:C.body,lineHeight:1.7,marginBottom:36 }}>
          Anonymity Mode means you explore freely. Companies see your production and skills — not your name or employer — until you're ready.
        </p>
        {[
          { on:true,  label:"Anonymity Mode", desc:"Browse privately. Reveal when you're ready." },
          { on:false, label:"Public Profile",  desc:"Your full profile is visible to all companies." },
        ].map(opt=>(
          <div key={opt.label} onClick={()=>setAnon(opt.on)} style={{ padding:"18px 0",cursor:"pointer",borderBottom:`1px solid ${C.rule}`,display:"flex",gap:16,alignItems:"flex-start" }}>
            <div style={{ width:20,height:20,borderRadius:"50%",border:`2px solid ${anon===opt.on?C.red:C.rule}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2 }}>
              {anon===opt.on && <div style={{ width:8,height:8,borderRadius:"50%",background:C.red }}/>}
            </div>
            <div>
              <div style={{ ...T.subhead,fontSize:15,color:C.ink,marginBottom:3 }}>{opt.label}</div>
              <div style={{ ...T.body,fontSize:13,color:C.muted }}>{opt.desc}</div>
            </div>
          </div>
        ))}
        <div style={{ marginTop:32 }}><Btn v="red" onClick={onDone}>Enter Orbit</Btn></div>
      </div>
    </div>
  );
}

                ))}
              </div>
            ))}
          </div>
          {showSched && schedParty && (
            <ScheduleModal party={schedParty}
              onClose={()=>{ setShowSched(false); setSchedParty(null); }}
              onConfirm={iv=>setInterviews(prev=>[{ id:"iv-"+Date.now(),...iv },...prev])}/>
          )}
        </div>
      )}

      {/* ── COMMUNITY (same as LO) ── */}
      {tab==="community" && (
        <div style={{ minHeight:"100vh",background:C.white }}>
          <div style={{ padding:"52px 24px 0",borderBottom:`1px solid ${C.rule}` }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:20 }}>
              <div>
                <div style={{ ...T.label,fontSize:10,color:C.red,marginBottom:10 }}>Community</div>
                <div style={{ ...T.display,fontSize:30,color:C.ink,lineHeight:.95 }}>The pulse<br/>of mortgage.</div>
              </div>
              {newsTab==="feed" && <button onClick={()=>setCompose(true)} style={{ padding:"10px 16px",background:C.red,border:"none",borderRadius:4,...T.label,fontSize:9,color:C.white,cursor:"pointer",flexShrink:0,marginBottom:4 }}>+ Post</button>}
            </div>
            <div style={{ display:"flex" }}>
              {[{id:"feed",label:"Community"},{id:"news",label:"Industry News"}].map(t=>(
                <button key={t.id} onClick={()=>setNewsTab(t.id)} style={{ padding:"11px 20px 13px",background:"none",border:"none",cursor:"pointer",...T.label,fontSize:9,color:newsTab===t.id?C.ink:C.muted,borderBottom:newsTab===t.id?`2px solid ${C.red}`:"2px solid transparent" }}>{t.label}</button>
              ))}
            </div>
          </div>
          {newsTab==="feed" && <>
            <div style={{ padding:"14px 24px",borderBottom:`1px solid ${C.rule}`,display:"flex",gap:7,overflowX:"auto" }}>
              {["All","Win","Career","Advice","Question"].map(c=>(
                <button key={c} onClick={()=>setCatFilter(c)} style={{ padding:"6px 14px",background:"transparent",flexShrink:0,border:`1px solid ${catFilter===c?C.ink:C.rule}`,borderRadius:20,cursor:"pointer",...T.label,fontSize:11,color:catFilter===c?C.ink:C.muted }}>{c.toUpperCase()}</button>
              ))}
            </div>
            {(catFilter==="All"?posts:posts.filter(p=>p.cat===catFilter)).map(post=>(
              <div key={post.id} style={{ padding:"22px 24px",borderBottom:`1px solid ${C.rule}` }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12 }}>
                  <div>
                    <div style={{ ...T.subhead,fontSize:13,color:C.ink }}>{post.author}</div>
                    <div style={{ ...T.caption,fontSize:11,color:C.muted }}>{post.role} · {post.time}</div>
                  </div>
                  <div style={{ ...T.label,fontSize:8,color:post.cat==="Win"?C.red:post.cat==="Advice"?C.green:C.muted,background:post.cat==="Win"?C.redSoft:post.cat==="Advice"?C.greenSoft:C.warm,padding:"3px 9px",borderRadius:20,flexShrink:0,marginLeft:8 }}>{post.cat.toUpperCase()}</div>
                </div>
                <p onClick={()=>setOpenPost(post)} style={{ ...T.body,fontSize:14,color:C.body,lineHeight:1.65,marginBottom:14,cursor:"pointer" }}>{post.text}</p>
                <div style={{ display:"flex",alignItems:"center",gap:20 }}>
                  <button onClick={()=>toggleLike(post.id)} style={{ background:"none",border:"none",display:"flex",alignItems:"center",gap:6,padding:0,cursor:"pointer" }}>
                    <span style={{ fontSize:16,color:post.liked?C.red:C.ghost }}>{post.liked?"♥":"♡"}</span>
                    <span style={{ ...T.label,fontSize:9,color:post.liked?C.red:C.muted }}>{post.likes}</span>
                  </button>
                  <button onClick={()=>setOpenPost(post)} style={{ background:"none",border:"none",display:"flex",alignItems:"center",gap:6,padding:0,cursor:"pointer" }}>
                    <span style={{ ...T.label,fontSize:9,color:C.muted }}>{(POST_REPLIES[post.id]||[]).length||post.replies} replies</span>
                    <span style={{ ...T.label,fontSize:9,color:C.red }}>View &#8594;</span>
                  </button>
                </div>
              </div>
            ))}
          </>}
          {newsTab==="news" && <>
            {NEWS.map(a=>(
              <div key={a.headline} style={{ padding:"20px 24px",borderBottom:`1px solid ${C.rule}`,cursor:"pointer" }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
                  <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                    <div style={{ ...T.label,fontSize:8,color:C.red }}>{a.source.toUpperCase()}</div>
                    <div style={{ width:2,height:2,borderRadius:"50%",background:C.rule }}/>
                    <div style={{ ...T.label,fontSize:8,color:C.muted }}>{a.time.toUpperCase()}</div>
                  </div>
                  <div style={{ ...T.label,fontSize:8,color:C.muted,background:C.warm,padding:"3px 9px",borderRadius:20 }}>{a.cat.toUpperCase()}</div>
                </div>
                <div style={{ ...T.heading,fontSize:15,color:C.ink,lineHeight:1.3,marginBottom:10 }}>{a.headline}</div>
                <div style={{ ...T.label,fontSize:9,color:C.red }}>Read article</div>
              </div>
            ))}
          </>}
          {compose && (
            <div style={{ position:"fixed",inset:0,background:"rgba(17,17,16,.72)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200 }}>
              <div style={{ background:C.white,borderRadius:"12px 12px 0 0",padding:"28px 24px 48px",width:"100%",maxWidth:420 }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20 }}>
                  <div style={{ ...T.heading,fontSize:18,color:C.ink }}>Share with the community</div>
                  <button onClick={()=>setCompose(false)} style={{ background:"none",border:"none",color:C.muted,fontSize:24,cursor:"pointer" }}>×</button>
                </div>
                <textarea value={newPost} onInput={e=>setNewPost(e.target.value)} placeholder="Share a win, ask a question, start a conversation…" rows={5}
                  style={{ width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${C.rule}`,...T.body,fontSize:14,color:C.ink,outline:"none",resize:"none",lineHeight:1.65,boxSizing:"border-box",marginBottom:8,padding:"0" }}/>
                <div style={{ ...T.caption,fontSize:11,color:newPost.length>500?C.red:C.ghost,textAlign:"right",marginBottom:16 }}>{newPost.length} / 500</div>
                <Btn v="red" onClick={submitPost} disabled={!newPost.trim()||newPost.length>500}>Post to Community</Btn>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── COMPANY PROFILE ── */}
      {tab==="profile" && (
        <div style={{ minHeight:"100vh",background:C.white }}>
          <div style={{ background:C.ink,padding:"52px 24px 28px" }}>
            <Logo dark size="sm"/>
            <div style={{ ...T.display,fontSize:28,color:C.white,lineHeight:.95,marginTop:20,marginBottom:6 }}>Summit Mortgage<br/>Partners</div>
            <div style={{ ...T.caption,fontSize:12,color:"rgba(255,255,255,.4)",marginBottom:16 }}>Dallas, TX · Independent Broker</div>
            <div style={{ display:"flex",gap:8 }}>
              {isPinnacle && <div style={{ display:"inline-flex",alignItems:"center",gap:5,background:C.goldSoft,border:`1px solid ${C.goldRule}`,borderRadius:20,padding:"4px 11px" }}><div style={{ width:6,height:6,borderRadius:"50%",background:C.gold }}/><div style={{ ...T.label,fontSize:8,color:C.gold }}>Pinnacle Partner</div></div>}
              <div style={{ display:"inline-flex",alignItems:"center",gap:5,background:"rgba(232,37,26,.15)",border:"1px solid rgba(232,37,26,.3)",borderRadius:20,padding:"4px 11px" }}><div style={{ width:6,height:6,borderRadius:"50%",background:C.red }}/><div style={{ ...T.label,fontSize:8,color:C.red }}>RocketPro Partner</div></div>
            </div>
          </div>
          <div style={{ padding:"0 24px" }}>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,background:C.rule,margin:"0 -24px",marginBottom:1 }}>
              {[{l:"Profile Views",v:"847"},{l:"Matches",v:pipeline.length},{l:"Interviews",v:pipeline.filter(c=>c.status==="interview").length},{l:"Roles Hiring",v:"3"}].map(s=>(
                <div key={s.l} style={{ padding:"20px 24px",background:C.white }}>
                  <div style={{ ...T.display,fontSize:28,color:C.red,marginBottom:4 }}>{s.v}</div>
                  <div style={{ ...T.label,fontSize:8,color:C.muted }}>{s.l.toUpperCase()}</div>
                </div>
              ))}
            </div>
            <div style={{ padding:"20px 0",borderBottom:`1px solid ${C.rule}` }}>
              <Lbl>Currently Hiring</Lbl>
              <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>
                {["Loan Officers","Processors","LOAs"].map(r=><div key={r} style={{ border:`1px solid ${C.rule}`,padding:"5px 11px",borderRadius:20,...T.label,fontSize:8,color:C.body }}>{r}</div>)}
              </div>
            </div>
            <div style={{ padding:"20px 0",borderBottom:`1px solid ${C.rule}` }}>
              <Lbl>Partner Promise we live by</Lbl>
              <div style={{ ...T.heading,fontSize:17,color:C.ink,lineHeight:1.2 }}>"We grow your brand.<br/>You grow your business."</div>
              <div style={{ ...T.label,fontSize:8,color:C.ghost,marginTop:6 }}>Partner Promise #6 · RocketPro</div>
            </div>

            {/* Photos */}
            <div style={{ padding:"20px 0",borderBottom:`1px solid ${C.rule}` }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
                <Lbl>Photos</Lbl>
                <button style={{ background:"none",border:"none",...T.label,fontSize:9,color:C.red,cursor:"pointer" }}>+ Add</button>
              </div>
              <div style={{ display:"flex",gap:8,overflowX:"auto" }}>
                {["🏢","🤝","🎉","🏡"].map((emoji,i)=>(
                  <div key={i} style={{ width:100,height:80,flexShrink:0,borderRadius:6,background:i===0?C.ink:C.warm,border:`1px solid ${C.rule}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32 }}>{emoji}</div>
                ))}
                <div style={{ width:100,height:80,flexShrink:0,borderRadius:6,background:C.warm,border:`2px dashed ${C.rule}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer" }}>
                  <div style={{ ...T.label,fontSize:9,color:C.ghost }}>+ Add</div>
                </div>
              </div>
            </div>

            {/* Social links */}
            <div style={{ padding:"20px 0",borderBottom:`1px solid ${C.rule}` }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
                <Lbl>Social Profiles</Lbl>
              </div>
              <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
                {[
                  { label:"LinkedIn",  icon:"in", value:"linkedin.com/company/summit-mortgage" },
                  { label:"Instagram", icon:"ig", value:"@summitmtg" },
                  { label:"Facebook",  icon:"fb", value:"Summit Mortgage Partners" },
                  { label:"Website",   icon:"W",  value:"summitmortgagepartners.com" },
                ].map(s=>(
                  <div key={s.label} style={{ display:"flex",alignItems:"center",gap:12,padding:"11px 14px",background:C.warm,borderRadius:4,border:`1px solid ${C.rule}` }}>
                    <div style={{ width:30,height:30,borderRadius:6,background:s.value?C.ink:C.rule,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
                      <div style={{ ...T.label,fontSize:9,color:s.value?C.white:C.ghost }}>{s.icon}</div>
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ ...T.label,fontSize:8,color:C.muted,marginBottom:1 }}>{s.label.toUpperCase()}</div>
                      <div style={{ ...T.body,fontSize:13,color:s.value?C.ink:C.ghost }}>{s.value||"Not added"}</div>
                    </div>
                    <div style={{ ...T.label,fontSize:9,color:C.red,cursor:"pointer" }}>{s.value?"Edit":"Add"}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ paddingTop:20,paddingBottom:100 }}>
              <Btn v="ghost" onClick={onSignOut} s={{ color:C.muted }}>Sign out</Btn>
            </div>
          </div>
        </div>
      )}

      <BottomNav tabs={TABS} active={tab} onTab={setTab}/>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");

  return (
    <div style={{ maxWidth:420, margin:"0 auto", minHeight:"100vh", background:C.white }}>
      {screen==="home"            && <HomeScreen onLO={()=>setScreen("lo-onboard")} onCompany={()=>setScreen("co-onboard")} onAspiring={()=>setScreen("aspiring")} onSignIn={()=>setScreen("signin")}/>}
      {screen==="signin"          && <SignInScreen onBack={()=>setScreen("home")} onSignedInLO={()=>setScreen("lo-app")} onSignedInCompany={()=>setScreen("co-app")} onSignedInPinnacle={()=>setScreen("co-app-pinnacle")}/>}
      {screen==="lo-onboard"      && <LOOnboard onDone={()=>setScreen("lo-app")}/>}
      {screen==="lo-app"          && <LOApp onSignOut={()=>setScreen("home")}/>}
      {screen==="aspiring"        && <AspiringLO onDone={()=>setScreen("lo-onboard")}/>}
      {screen==="co-onboard"      && <CompanyOnboard onDone={()=>setScreen("co-app")} onDonePinnacle={()=>setScreen("co-app-pinnacle")}/>}
      {screen==="co-app"          && <CompanyApp isPinnacle={false} onSignOut={()=>setScreen("home")}/>}
      {screen==="co-app-pinnacle" && <CompanyApp isPinnacle={true}  onSignOut={()=>setScreen("home")}/>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
